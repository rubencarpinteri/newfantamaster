// ─── Supabase Client ──────────────────────────────────────────────────────────
class SupabaseClient {
  constructor(url, key) {
    this.url = url;
    this.key = key;
    this.headers = { "Content-Type": "application/json", apikey: key, Authorization: `Bearer ${key}` };
  }

  async query(table, method = "GET", body = null, params = "") {
    const res = await fetch(`${this.url}/rest/v1/${table}${params}`, {
      method,
      headers: this.headers,
      body: body ? JSON.stringify(body) : null,
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    if (method === "DELETE" || res.status === 204) return null;
    return res.json();
  }

  async rpc(fn, body = {}) {
    const res = await fetch(`${this.url}/rest/v1/rpc/${fn}`, {
      method: "POST",
      headers: { ...this.headers, "Prefer": "return=representation" },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    return res.json();
  }

  async select(table, params = "") {
    return this.query(table, "GET", null, params);
  }

  async insert(table, body, opts = "") {
    const res = await fetch(`${this.url}/rest/v1/${table}`, {
      method: "POST",
      headers: { ...this.headers, Prefer: "return=representation" + (opts ? "," + opts : "") },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: res.statusText }));
      throw err;
    }
    return res.json();
  }

  async upsert(table, body, conflict) {
    const res = await fetch(`${this.url}/rest/v1/${table}`, {
      method: "POST",
      headers: { ...this.headers, Prefer: `return=representation,resolution=merge-duplicates` },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(text);
    }
    return res.json();
  }

  async update(table, body, params) {
    const res = await fetch(`${this.url}/rest/v1/${table}${params}`, {
      method: "PATCH",
      headers: { ...this.headers, Prefer: "return=representation" },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(text);
    }
    return res.json();
  }
}

// ─── Auth Helpers ─────────────────────────────────────────────────────────────
async function login(username, password) {
  // Fetch user by username
  const users = await db.select("league_users", `?username=eq.${encodeURIComponent(username)}&select=id,username,display_name,is_admin,password_hash`);
  if (!users || users.length === 0) throw new Error("Utente non trovato");
  const user = users[0];
  // Verify password via RPC — Supabase returns the boolean wrapped in an array e.g. [true]
  const result = await db.rpc("verify_password", { input_password: password, stored_hash: user.password_hash });
  const isValid = Array.isArray(result) ? result[0] : result;
  if (!isValid) throw new Error("Password errata");
  // Create session
  const sessions = await db.insert("sessions", { user_id: user.id });
  const session = sessions[0];
  const userData = { id: user.id, username: user.username, display_name: user.display_name, is_admin: user.is_admin };
  return { token: session.token, user: userData };
}

async function logout(token) {
  await db.update("sessions", { is_active: false }, `?token=eq.${token}`);
}

async function validateSession(token) {
  // Fetch session, then separately fetch user to avoid join issues
  const sessions = await db.select("sessions", `?token=eq.${encodeURIComponent(token)}&is_active=eq.true&expires_at=gt.${new Date().toISOString()}&select=user_id`);
  if (!sessions || sessions.length === 0) return null;
  const userId = sessions[0].user_id;
  const users = await db.select("league_users", `?id=eq.${userId}&select=id,username,display_name,is_admin`);
  if (!users || users.length === 0) return null;
  return users[0];
}

// ─── Prediction Helpers ───────────────────────────────────────────────────────
async function submitPrediction(userId, matchdayId, text, token) {
  // Validate
  if (!text || text.trim().length === 0) throw new Error("La previsione non può essere vuota");

  // Check deadline
  const matchdays = await db.select("matchdays", `?id=eq.${matchdayId}&select=deadline,is_completed`);
  if (!matchdays || matchdays.length === 0) throw new Error("Giornata non trovata");
  const md = matchdays[0];
  if (md.is_completed) throw new Error("Giornata già completata, previsioni bloccate");
  if (new Date() > new Date(md.deadline)) throw new Error("Scadenza superata, previsione bloccata");

  // Check if existing prediction
  const existing = await db.select("predictions", `?user_id=eq.${userId}&matchday_id=eq.${matchdayId}`);

  let result;
  if (existing && existing.length > 0) {
    const pred = existing[0];
    if (pred.is_locked) throw new Error("Previsione bloccata, impossibile modificare");
    result = await db.update("predictions", { prediction_text: text.trim() }, `?user_id=eq.${userId}&matchday_id=eq.${matchdayId}`);
    // Log audit
    await db.insert("submission_audit_log", { user_id: userId, matchday_id: matchdayId, action: "UPDATE", prediction_text: text.trim() }).catch(console.error);
  } else {
    result = await db.insert("predictions", { user_id: userId, matchday_id: matchdayId, prediction_text: text.trim() });
    await db.insert("submission_audit_log", { user_id: userId, matchday_id: matchdayId, action: "CREATE", prediction_text: text.trim() }).catch(console.error);
  }

  if (!result || result.length === 0) {
    await db.insert("submission_audit_log", { user_id: userId, matchday_id: matchdayId, action: "FAILED", error_message: "No result returned" }).catch(console.error);
    throw new Error("Errore nel salvataggio: nessun dato restituito dal server");
  }

  return result[0];
}

// ─── React App ────────────────────────────────────────────────────────────────
const { useState, useEffect, useCallback, useRef } = React;

// ─── State Store (simple global) ──────────────────────────────────────────────
let _listeners = [];
let _state = {
  auth: null, // { token, user }
  loading: true,
};

function getState() { return _state; }
function setState(patch) {
  _state = { ..._state, ...patch };
  _listeners.forEach(fn => fn(_state));
}
function useStore() {
  const [s, setS] = useState(_state);
  useEffect(() => {
    _listeners.push(setS);
    return () => { _listeners = _listeners.filter(f => f !== setS); };
  }, []);
  return s;
}

// ─── Init: restore session ────────────────────────────────────────────────────
(async () => {
  const token = localStorage.getItem("fm_token");
  if (token) {
    try {
      const user = await validateSession(token);
      if (user) { setState({ auth: { token, user }, loading: false }); return; }
    } catch {}
  }
  localStorage.removeItem("fm_token");
  setState({ loading: false });
})();

// ─── Shared helpers ───────────────────────────────────────────────────────────
async function loadMatchesForMatchday(matchdayId) {
  const [rawMatches, allTeams] = await Promise.all([
    db.select("matches", `?matchday_id=eq.${matchdayId}&select=id,home_team_id,away_team_id,home_goals,away_goals,home_fantapunti,away_fantapunti,result,is_played&order=id.asc`),
    db.select("teams", "?select=id,name"),
  ]);
  const teamMap = {};
  (allTeams || []).forEach(t => { teamMap[t.id] = t.name; });
  return (rawMatches || []).map(m => ({
    ...m,
    home_name: teamMap[m.home_team_id] || "?",
    away_name: teamMap[m.away_team_id] || "?",
  }));
}

function buildPredText(picks, matches) {
  return matches.map(m => `${m.home_name} vs ${m.away_name}: ${picks[m.id] || "?"}`).join(" | ");
}

function parsePredText(text, matches) {
  const picks = {};
  if (!text) return picks;
  text.split(" | ").forEach(part => {
    const rx = /^(.+) vs (.+): ([1X2?])$/.exec(part);
    if (!rx) return;
    const found = matches.find(m => m.home_name === rx[1] && m.away_name === rx[2]);
    if (found) picks[found.id] = rx[3];
  });
  return picks;
}

function PickBtn({ value, selected, disabled, onPick }) {
  const bg = { "1": "#2e7d32", "X": "#e65100", "2": "#1565c0" };
  return (
    <button onClick={onPick} disabled={disabled} style={{
      width: 44, height: 36, borderRadius: 8,
      border: selected ? "none" : "1.5px solid #ddd",
      background: selected ? bg[value] : "#f5f5f5",
      color: selected ? "#fff" : "#666",
      fontWeight: 700, fontSize: 14, cursor: disabled ? "not-allowed" : "pointer",
      opacity: disabled ? 0.45 : 1, fontFamily: "inherit", transition: "all 0.12s",
      boxShadow: selected ? `0 2px 8px ${bg[value]}55` : "none",
    }}>{value}</button>
  );
}

function ResultPill({ result }) {
  const s = { "1": { bg: "#e8f5e9", color: "#2e7d32", border: "#a5d6a7" }, "X": { bg: "#fff8e1", color: "#e65100", border: "#ffe082" }, "2": { bg: "#e3f2fd", color: "#1565c0", border: "#90caf9" } };
  const c = s[result] || { bg: "#f5f5f5", color: "#999", border: "#ddd" };
  return (
    <span style={{ background: c.bg, color: c.color, border: `1px solid ${c.border}`, fontWeight: 700, fontSize: 12, padding: "2px 9px", borderRadius: 20, display: "inline-block", minWidth: 26, textAlign: "center" }}>
      {result || "—"}
    </span>
  );
}

  const [viewPreds,   setViewPreds]   = useState([]);
  const [loadingView, setLoadingView] = useState(false);

  // Load everything on mount
  useEffect(() => {
    (async () => {
      const now = new Date();
      const [mds, users] = await Promise.all([
        db.select("matchdays", "?order=number.asc&select=id,number,deadline,is_completed,is_frozen"),
        db.select("league_users", "?is_admin=eq.false&select=id,display_name,username&order=display_name.asc"),
      ]);
      setAllUsers(users || []);
      setAllMatchdays(mds || []);

      // Find the current open matchday (not completed, not frozen, deadline in future)
      const open = (mds || []).find(m => !m.is_completed && !m.is_frozen && new Date(m.deadline) > now);
      // Or if all deadlines passed but not completed, take the first non-completed
      const current = open || (mds || []).find(m => !m.is_completed);
      setOpenMd(current || null);

      if (current) {
        setLoadingMatches(true);
        const [enriched, preds, myPred] = await Promise.all([
          loadMatchesForMatchday(current.id),
          db.select("predictions", `?matchday_id=eq.${current.id}&select=id,user_id,prediction_text,submitted_at,updated_at,score`),
          db.select("predictions", `?matchday_id=eq.${current.id}&user_id=eq.${user.id}`),
        ]);
        setMatches(enriched);
        setAllPreds(preds || []);
        if (myPred && myPred.length > 0) {
          setSavedPred(myPred[0]);
          setPicks(parsePredText(myPred[0].prediction_text, enriched));

        loadMatchesForMatchday(viewMd.id),

  const predText   = buildPredText(picks, matches);
  const hasChanged = savedPred ? predText !== savedPred.prediction_text : allPicked;
  const minsLeft   = openMd ? Math.max(0, Math.floor((new Date(openMd.deadline) - now) / 60000)) : 0;

      setSavedPred(result);
      setSaveState("saved");
      // refresh allPreds
      const preds = await db.select("predictions", `?matchday_id=eq.${openMd.id}&select=id,user_id,prediction_text,submitted_at,updated_at,score`);
      setAllPreds(preds || []);

                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: isMe ? 700 : 500, color: "#1a1a2e", fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {u.display_name}{isMe && <span style={{ color: "#667eea", fontSize: 10, marginLeft: 4 }}>Tu</span>}
                        </div>
                        {submitted && pred && (
                          <div style={{ fontSize: 10, color: "#aaa", marginTop: 1 }}>
                            {new Date(pred.submitted_at).toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" })} · {new Date(pred.submitted_at).toLocaleDateString("it-IT")}
                          </div>
                        )}
                      </div>
                      {submitted
                        ? <span style={{ fontSize: 10, color: "#10b981", fontWeight: 700, flexShrink: 0 }}>✓</span>
                        : <span style={{ fontSize: 10, color: "#ef4444", fontWeight: 700, flexShrink: 0 }}>—</span>}
                    </div>
                  );
                })}
              </div>
            )}
          </Card>
        </div>
      </div>

      {/* ══ ALL PREDICTIONS for current matchday (visible after deadline) ══ */}
      {openMd && (
        <Card style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#888", letterSpacing: "0.1em", textTransform: "uppercase" }}>
              Pronostici di tutti — G{openMd.number}
            </div>
            {isExpired || isComplete || isFrozen
              ? <Badge color="green">Visibili</Badge>
              : <Badge color="amber">Visibili dopo la deadline</Badge>}
          </div>

          {!isExpired && !isComplete && !isFrozen ? (
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "16px 20px", background: "#fffbeb", borderRadius: 10, border: "1px solid #fde68a" }}>
              <div style={{ fontSize: 28 }}>🔒</div>
              <div>
                <div style={{ fontWeight: 600, color: "#92400e", fontSize: 14 }}>Pronostici nascosti fino alla deadline</div>
                <div style={{ color: "#b45309", fontSize: 13, marginTop: 2 }}>Potrai vedere i pronostici di tutti dopo la deadline per evitare influenze.</div>
              </div>
            </div>
          ) : loadingMatches ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 30 }}><Spinner size={28} /></div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
              {allUsers.map((u, uIdx) => {
                const pred = allPreds.find(p => p.user_id === u.id);
                const isMe = u.id === user.id;
                const picks = pred ? parsedPicks(pred.prediction_text, matches) : {};

                return (
                  <div key={u.id} style={{
                    borderRadius: 12, overflow: "hidden",
                    border: isMe ? "2px solid #667eea" : "1px solid #e8e8e8",
                    background: "#fff",
                  }}>
                    {/* Card header */}
                    <div style={{
                      padding: "10px 14px",
                      background: isMe ? "linear-gradient(135deg, #667eea15, #764ba215)" : `hsl(${uIdx * 36},60%,97%)`,
                      borderBottom: "1px solid #f0f0f0",
                      display: "flex", alignItems: "center", gap: 8,
                    }}>
                      <div style={{ width: 30, height: 30, borderRadius: "50%", background: `hsl(${uIdx * 36},60%,55%)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: "#fff", flexShrink: 0 }}>
                        {u.display_name[0]}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 700, fontSize: 13, color: "#1a1a2e", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {u.display_name}{isMe && <span style={{ color: "#667eea", fontSize: 10, marginLeft: 4 }}>Tu</span>}
                        </div>
                        {pred ? (
                          <div style={{ fontSize: 10, color: "#aaa" }}>
                            {new Date(pred.submitted_at).toLocaleString("it-IT")}
                          </div>
                        ) : (
                          <div style={{ fontSize: 10, color: "#ef4444" }}>Non inviato</div>
                        )}
                      </div>
                      {pred?.score != null && <Badge color="purple">⭐ {Number(pred.score).toFixed(1)}</Badge>}
                    </div>

                    {/* Picks grid */}
                    {pred && matches.length > 0 ? (
                      <div style={{ padding: "10px 12px", display: "flex", flexDirection: "column", gap: 5 }}>
                        {matches.map(m => {
                          const pick = picks[m.id];
                          const correct = m.is_played && pick && pick === m.result;
                          const wrong   = m.is_played && pick && pick !== m.result;
                          return (
                            <div key={m.id} style={{
                              display: "grid", gridTemplateColumns: "1fr 32px 1fr 24px 14px", alignItems: "center", gap: 4,
                              padding: "4px 6px", borderRadius: 6, fontSize: 12,
                              background: correct ? "#f0fdf4" : wrong ? "#fef2f2" : "#fafafa",
                            }}>
                              <div style={{ fontWeight: 600, color: "#333", textAlign: "right", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.home_name}</div>
                              <div style={{ textAlign: "center" }}>{pick ? <ResultPill result={pick} /> : <span style={{ color: "#ddd" }}>—</span>}</div>
                              <div style={{ fontWeight: 600, color: "#333", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.away_name}</div>
                              <div style={{ textAlign: "center", fontSize: 11, color: "#aaa" }}>
                                {m.is_played ? <ResultPill result={m.result} /> : null}
                              </div>
                              <div style={{ textAlign: "center", fontWeight: 700, fontSize: 12 }}>
                                {correct && <span style={{ color: "#10b981" }}>✓</span>}
                                {wrong   && <span style={{ color: "#ef4444" }}>✗</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ) : !pred ? (
                      <div style={{ padding: "12px 14px", color: "#ef4444", fontSize: 12, fontStyle: "italic" }}>Nessuna previsione inviata.</div>
                    ) : (
                      <div style={{ padding: "12px 14px", color: "#aaa", fontSize: 12 }}>Partite non disponibili.</div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      )}

      {/* ══ MATCHDAY TIMELINE ══ */}
      <Card>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#888", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16 }}>
          Calendario stagione — {allMatchdays.filter(m => m.is_completed).length}/38 giornate completate
        </div>

        {/* Progress bar */}
        <div style={{ background: "#f0f0f5", borderRadius: 20, height: 8, marginBottom: 20, overflow: "hidden" }}>
          <div style={{
            height: "100%", borderRadius: 20,
            background: "linear-gradient(90deg, #667eea, #764ba2)",
            width: `${(allMatchdays.filter(m => m.is_completed).length / 38) * 100}%`,
            transition: "width 0.5s ease",
          }} />
        </div>

        {/* Matchday grid */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(70px, 1fr))", gap: 6 }}>
          {allMatchdays.map(md => {
            const status = mdStatus(md);
            const isOpen = !md.is_completed && !md.is_frozen && now < new Date(md.deadline);
            const isCurrent = openMd?.id === md.id;
            const myPred = allPreds.find(p => p.matchday_id === md.id || (md.id === openMd?.id));

            return (
              <div
                key={md.id}
                onClick={() => setViewMd(viewMd?.id === md.id ? null : md)}
                style={{
                  padding: "8px 4px", borderRadius: 8, textAlign: "center", cursor: "pointer",
                  border: isCurrent ? "2px solid #667eea" : viewMd?.id === md.id ? "2px solid #764ba2" : "1px solid #e8e8e8",
                  background: md.is_completed ? "#f8f9fc" : md.is_frozen ? "#e3f2fd" : isOpen ? "#fff8e1" : "#fff",
                  transition: "all 0.12s",
                  position: "relative",
                }}
              >
                {/* Status dot */}
                <div style={{
                  width: 8, height: 8, borderRadius: "50%", background: status.dot,
                  margin: "0 auto 4px",
                  boxShadow: isOpen ? `0 0 6px ${status.dot}` : "none",
                }} />
                <div style={{ fontWeight: 700, fontSize: 13, color: isCurrent ? "#667eea" : "#1a1a2e", fontFamily: "Rajdhani,sans-serif" }}>
                  G{md.number}
                </div>
                <div style={{ fontSize: 9, color: status.color, fontWeight: 600, marginTop: 1 }}>
                  {status.label}
                </div>
              </div>
            );
          })}
        </div>

        {/* Legend */}
        <div style={{ display: "flex", gap: 16, marginTop: 16, flexWrap: "wrap" }}>
          {[
            { dot: "#10b981", label: "Completata" },
            { dot: "#f59e0b", label: "Aperta" },
            { dot: "#1565c0", label: "Congelata" },
            { dot: "#ccc", label: "In arrivo" },
          ].map(({ dot, label }) => (
            <div key={label} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#888" }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: dot }} />
              {label}
            </div>
          ))}
        </div>
      </Card>

      {/* ══ MATCHDAY DETAIL VIEWER (shown when user clicks a matchday) ══ */}
      {viewMd && (
        <Card style={{ marginTop: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div>
              <div style={{ fontFamily: "Rajdhani,sans-serif", fontSize: 20, fontWeight: 700, color: "#1a1a2e" }}>
                Giornata {viewMd.number} — {mdStatus(viewMd).label}
              </div>
              <div style={{ fontSize: 12, color: "#888" }}>Deadline: {new Date(viewMd.deadline).toLocaleString("it-IT")}</div>
            </div>
            <button onClick={() => setViewMd(null)} style={{ background: "none", border: "none", cursor: "pointer", color: "#888", fontSize: 20, padding: 4 }}>✕</button>
          </div>

          {loadingView ? (
            <div style={{ display: "flex", justifyContent: "center", padding: 30 }}><Spinner size={28} /></div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              {/* Matches */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>Partite</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {viewMatches.length === 0 && <div style={{ color: "#bbb", fontSize: 13 }}>Nessuna partita</div>}
                  {viewMatches.map(m => (
                    <div key={m.id} style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 8, padding: "8px 12px", background: "#fafafa", borderRadius: 8, border: "1px solid #f0f0f0", fontSize: 13 }}>
                      <div style={{ fontWeight: 600, textAlign: "right" }}>{m.home_name}</div>
                      <div style={{ textAlign: "center", minWidth: 70 }}>
                        {m.is_played
                          ? <span style={{ fontFamily: "Rajdhani,sans-serif", fontWeight: 700, fontSize: 17 }}>{m.home_goals} – {m.away_goals} <ResultPill result={m.result} /></span>
                          : <span style={{ color: "#ccc" }}>vs</span>}
                      </div>
                      <div style={{ fontWeight: 600 }}>{m.away_name}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Pronostici */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>
                  Pronostici ({viewPreds.length}/{allUsers.length})
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {allUsers.map((u, uIdx) => {
                    const pred = viewPreds.find(p => p.user_id === u.id);
                    const picks = pred ? parsedPicks(pred.prediction_text, viewMatches) : {};
                    const isMe = u.id === user.id;
                    const showPreds = viewMd.is_completed || now > new Date(viewMd.deadline) || viewMd.is_frozen;
                    return (
                      <div key={u.id} style={{ padding: "8px 10px", borderRadius: 8, background: isMe ? "#f7f8ff" : "#fafafa", border: isMe ? "1px solid #667eea30" : "1px solid #f0f0f0" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: pred && showPreds ? 6 : 0 }}>
                          <div style={{ width: 8, height: 8, borderRadius: "50%", background: pred ? "#10b981" : "#ef4444", boxShadow: pred ? "0 0 5px #10b98166" : "0 0 5px #ef444466" }} />
                          <span style={{ fontWeight: 600, fontSize: 12, color: "#1a1a2e" }}>{u.display_name}</span>
                          {pred?.score != null && <Badge color="purple">⭐ {Number(pred.score).toFixed(1)}</Badge>}
                          {pred && <span style={{ fontSize: 10, color: "#aaa", marginLeft: "auto" }}>{new Date(pred.submitted_at).toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" })}</span>}
                        </div>
                        {pred && showPreds && viewMatches.length > 0 && (
                          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                            {viewMatches.map(m => {
                              const pick = picks[m.id];
                              const correct = m.is_played && pick && pick === m.result;
                              const wrong = m.is_played && pick && pick !== m.result;
                              return (
                                <span key={m.id} title={`${m.home_name} vs ${m.away_name}`} style={{
                                  padding: "2px 7px", borderRadius: 6, fontSize: 11, fontWeight: 700,
                                  background: correct ? "#dcfce7" : wrong ? "#fee2e2" : pick ? "#f0f4ff" : "#f5f5f5",
                                  color: correct ? "#16a34a" : wrong ? "#dc2626" : pick ? "#4338ca" : "#aaa",
                                  border: `1px solid ${correct ? "#bbf7d0" : wrong ? "#fecaca" : pick ? "#c7d2fe" : "#e5e7eb"}`,
                                }}>
                                  {pick || "?"}
                                </span>
                              );
                            })}
                          </div>
                        )}
                        {pred && !showPreds && (
                          <div style={{ fontSize: 10, color: "#f59e0b", fontStyle: "italic" }}>Visibile dopo la deadline</div>
                        )}
                        {!pred && <div style={{ fontSize: 10, color: "#ef4444", fontStyle: "italic" }}>Non inviato</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </Card>
      )}
    </div>
  );
}

// ─── Standings Page ────────────────────────────────────────────────────────────
function StandingsPage({ user }) {
  const [standings, setStandings] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      const [users, predictions] = await Promise.all([
        db.select("league_users", "?is_admin=eq.false&select=id,display_name,username"),
        db.select("predictions", "?score=not.is.null&select=user_id,score"),
      ]);
      const scoreMap = {};
      predictions.forEach(p => {
        if (!scoreMap[p.user_id]) scoreMap[p.user_id] = { total: 0, count: 0 };
        scoreMap[p.user_id].total += Number(p.score);
        scoreMap[p.user_id].count += 1;
      });
      const ranked = users.map(u => ({
        ...u,
        total: scoreMap[u.id]?.total || 0,
        count: scoreMap[u.id]?.count || 0,
        avg: scoreMap[u.id] ? (scoreMap[u.id].total / scoreMap[u.id].count).toFixed(2) : "—",
      })).sort((a, b) => b.total - a.total);
      setStandings(ranked);
      setLoading(false);
    })();
  }, []);

  if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={40} /></div>;

  return (
    <div>
      <h1 style={{ fontFamily: "Rajdhani,sans-serif", fontSize: 32, fontWeight: 700, color: "#1a1a2e", margin: "0 0 4px" }}>Classifica</h1>
      <p style={{ color: "#888", margin: "0 0 32px" }}>Punti accumulati durante la stagione</p>
      <Card>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ borderBottom: "2px solid #f0f0f0" }}>
              <th style={{ textAlign: "left", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600, width: 50 }}>#</th>
              <th style={{ textAlign: "left", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>PARTECIPANTE</th>
              <th style={{ textAlign: "center", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>PREV.</th>
              <th style={{ textAlign: "center", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>MEDIA</th>
              <th style={{ textAlign: "right", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>PUNTI TOT.</th>
            </tr>
          </thead>
          <tbody>
            {standings.map((s, i) => (
              <tr key={s.id} className="table-row" style={{ borderBottom: "1px solid #f5f5f5", background: s.id === user.id ? "#f7f8ff" : "transparent" }}>
                <td style={{ padding: "14px 12px", fontWeight: 700, color: i < 3 ? ["#f59e0b", "#94a3b8", "#b87333"][i] : "#999", fontSize: 16, fontFamily: "Rajdhani,sans-serif" }}>
                  {i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i + 1}`}
                </td>
                <td style={{ padding: "14px 12px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 32, height: 32, borderRadius: "50%", background: `hsl(${i * 36},60%,55%)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: "#fff" }}>
                      {s.display_name[0]}
                    </div>
                    <div>
                      <div style={{ fontWeight: 500, color: "#1a1a2e", fontSize: 15 }}>{s.display_name}</div>
                      {s.id === user.id && <div style={{ fontSize: 11, color: "#667eea" }}>Tu</div>}
                    </div>
                  </div>
                </td>
                <td style={{ padding: "14px 12px", textAlign: "center", color: "#555", fontSize: 14 }}>{s.count}</td>
                <td style={{ padding: "14px 12px", textAlign: "center", color: "#555", fontSize: 14 }}>{s.avg}</td>
                <td style={{ padding: "14px 12px", textAlign: "right", fontWeight: 700, fontSize: 18, color: "#1a1a2e", fontFamily: "Rajdhani,sans-serif" }}>{s.total.toFixed(1)}</td>
              </tr>
            ))}
          </tbody>
        </table>
        {standings.length === 0 && <div style={{ textAlign: "center", padding: 40, color: "#888" }}>Nessun punteggio assegnato ancora</div>}
      </Card>
    </div>
  );
}

// ─── History Page ─────────────────────────────────────────────────────────────
function HistoryPage({ user }) {
  const [predictions, setPredictions] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      const mds = await db.select("matchdays", "?select=id,number,is_completed");
      const mdMap = {};
      (mds || []).forEach(m => { mdMap[m.id] = m; });
      const preds = await db.select("predictions", `?user_id=eq.${user.id}&order=submitted_at.desc&select=id,prediction_text,submitted_at,updated_at,is_locked,score,score_notes,matchday_id`);
      setPredictions((preds || []).map(p => ({ ...p, matchday: mdMap[p.matchday_id] })));
      setLoading(false);
    })();
  }, [user.id]);

  if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={40} /></div>;

  return (
    <div>
      <h1 style={{ fontFamily: "Rajdhani,sans-serif", fontSize: 32, fontWeight: 700, color: "#1a1a2e", margin: "0 0 4px" }}>Le mie previsioni</h1>
      <p style={{ color: "#888", margin: "0 0 32px" }}>Storico completo di tutte le previsioni inviate</p>
      {predictions.length === 0 && <Alert type="info">Non hai ancora inviato previsioni.</Alert>}
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        {predictions.map(p => (
          <Card key={p.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 18, color: "#1a1a2e", fontFamily: "Rajdhani,sans-serif" }}>
                  Giornata {p.matchday?.number || "?"}
                </div>
                <div style={{ fontSize: 12, color: "#999", marginTop: 2 }}>
                  Inviata: {new Date(p.submitted_at).toLocaleString("it-IT")}
                  {p.updated_at !== p.submitted_at && ` · Modificata: ${new Date(p.updated_at).toLocaleString("it-IT")}`}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {p.is_locked && <Badge color="gray">🔒</Badge>}
                {p.score != null
                  ? <Badge color="purple">⭐ {Number(p.score).toFixed(1)} pt</Badge>
                  : p.matchday?.is_completed
                    ? <Badge color="amber">In attesa</Badge>
                    : <Badge color="green">Inviata</Badge>}
              </div>
            </div>
            <div style={{ background: "#f8f9fc", borderRadius: 8, padding: "10px 14px", color: "#444", fontSize: 13, borderLeft: "3px solid #667eea", wordBreak: "break-word" }}>
              {p.prediction_text}
            </div>
            {p.score_notes && (
              <div style={{ marginTop: 10, fontSize: 13, color: "#777", background: "#fff8e1", padding: "8px 12px", borderRadius: 6, borderLeft: "3px solid #f59e0b" }}>
                📝 {p.score_notes}
              </div>
            )}
          </Card>
        ))}
      </div>
    </div>
  );
}

// ─── Calendar Page ─────────────────────────────────────────────────────────────
function CalendarPage({ user }) {
  const [allMatchdays, setAllMatchdays] = useState([]);
  const [selectedMd,   setSelectedMd]  = useState(null);
  const [matches,      setMatches]     = useState([]);
  const [teamMap,      setTeamMap]     = useState({});
  const [myPreds,      setMyPreds]     = useState({});
  const [loadingMds,   setLoadingMds]  = useState(true);
  const [loadingMatch, setLoadingMatch]= useState(false);
  const [filter,       setFilter]      = useState("all");

  useEffect(() => {
    (async () => {
      const [mds, teams, preds] = await Promise.all([
        db.select("matchdays", "?order=number.asc&select=id,number,deadline,is_completed,is_frozen"),
        db.select("teams", "?select=id,name,color"),
        db.select("predictions", `?user_id=eq.${user.id}&select=matchday_id,prediction_text,score,score_notes,submitted_at,updated_at`),
      ]);
      const tm = {};
      (teams || []).forEach(t => { tm[t.id] = t; });
      const pm = {};
      (preds || []).forEach(p => { pm[p.matchday_id] = p; });
      setTeamMap(tm);
      setMyPreds(pm);
      setAllMatchdays(mds || []);
      const completed = (mds || []).filter(m => m.is_completed);
      const fallback  = (mds || []).find(m => !m.is_completed);
      setSelectedMd(completed[completed.length - 1] || fallback || null);
      setLoadingMds(false);
    })();
  }, [user.id]);

  useEffect(() => {
    if (!selectedMd) return;
    setLoadingMatch(true);
    setMatches([]);
    (async () => {
      const enriched = await loadMatchesForMatchday(selectedMd.id);
      setMatches(enriched);
      setLoadingMatch(false);
    })();
  }, [selectedMd?.id]);

  const now = new Date();
  const visibleMatchdays = allMatchdays.filter(md => {
    if (filter === "played")   return md.is_completed;
    if (filter === "upcoming") return !md.is_completed;
    return true;
  });

  const myPred = myPreds[selectedMd?.id];
  const myPickMap = {};
  if (myPred && matches.length > 0) {
    myPred.prediction_text?.split(" | ").forEach(part => {
      const rx = /^(.+) vs (.+): ([1X2?])$/.exec(part);
      if (!rx) return;
      const m = matches.find(mx => mx.home_name === rx[1] && mx.away_name === rx[2]);
      if (m) myPickMap[m.id] = rx[3];
    });
  }

  const correctCount = matches.filter(m => m.is_played && myPickMap[m.id] && myPickMap[m.id] === m.result).length;
  const wrongCount   = matches.filter(m => m.is_played && myPickMap[m.id] && myPickMap[m.id] !== m.result).length;

  if (loadingMds) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={40} /></div>;

  return (
    <div>
      <h1 style={{ fontFamily: "Rajdhani,sans-serif", fontSize: 32, fontWeight: 700, color: "#1a1a2e", margin: "0 0 4px" }}>Calendario</h1>
      <p style={{ color: "#888", margin: "0 0 20px" }}>Tutti i risultati e le partite della stagione</p>
      <div style={{ display: "flex", gap: 6, marginBottom: 24 }}>
        {[["all", "Tutte (38)"], ["played", "Giocate"], ["upcoming", "In arrivo"]].map(([v, label]) => (
          <button key={v} onClick={() => setFilter(v)} style={{
            padding: "7px 16px", borderRadius: 20, border: "1.5px solid",
            borderColor: filter === v ? "#667eea" : "#e0e0e0",
            background: filter === v ? "#667eea" : "#fff",
            color: filter === v ? "#fff" : "#666",
            fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
          }}>{label}</button>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "170px 1fr", gap: 24, alignItems: "start" }}>
        <div style={{ maxHeight: "75vh", overflowY: "auto", paddingRight: 4 }}>
          {visibleMatchdays.map(md => {
            const pred = myPreds[md.id];
            const ddl = new Date(md.deadline);
            const isOpen = !md.is_completed && !md.is_frozen && now < ddl;
            const isSelected = selectedMd?.id === md.id;
            return (
              <div key={md.id} onClick={() => setSelectedMd(md)} style={{
                padding: "10px 12px", borderRadius: 9, cursor: "pointer", marginBottom: 5,
                background: isSelected ? "#f0f1ff" : "#fff",
                border: isSelected ? "1.5px solid #667eea" : "1.5px solid #e8e8e8",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontWeight: 700, fontSize: 14, color: "#1a1a2e" }}>G{md.number}</span>
                  {md.is_frozen
                    ? <span style={{ fontSize: 10, color: "#1565c0", fontWeight: 700 }}>🧊</span>
                    : md.is_completed
                      ? <span style={{ fontSize: 10, color: "#888" }}>✓</span>
                      : isOpen
                        ? <span style={{ fontSize: 10, color: "#10b981", fontWeight: 700 }}>OPEN</span>
                        : <span style={{ fontSize: 10, color: "#ccc" }}>—</span>}
                </div>
                {pred ? (
                  pred.score != null
                    ? <div style={{ fontSize: 11, color: "#667eea", fontWeight: 600, marginTop: 2 }}>⭐ {Number(pred.score).toFixed(1)} pt</div>
                    : <div style={{ fontSize: 11, color: "#10b981", marginTop: 2 }}>✓ Inviata</div>
                ) : md.is_completed ? (
                  <div style={{ fontSize: 11, color: "#ef4444", marginTop: 2 }}>✗ Mancante</div>
                ) : null}
              </div>
            );
          })}
        </div>
        {selectedMd && (
          <div>
            <Card style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontFamily: "Rajdhani,sans-serif", fontSize: 24, fontWeight: 700, color: "#1a1a2e" }}>Giornata {selectedMd.number}</div>
                  <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>{new Date(selectedMd.deadline).toLocaleString("it-IT")}</div>
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "flex-end" }}>
                  {selectedMd.is_frozen && <Badge color="blue">🧊 Congelata</Badge>}
                  {selectedMd.is_completed ? <Badge color="gray">Completata</Badge> : now < new Date(selectedMd.deadline) ? <Badge color="green">Aperta</Badge> : <Badge color="amber">Chiusa</Badge>}
                  {myPred?.score != null && <Badge color="purple">⭐ {Number(myPred.score).toFixed(1)} pt</Badge>}
                </div>
              </div>
              {myPred && (
                <div style={{ marginTop: 14, padding: "10px 14px", background: "#f7f8ff", borderRadius: 8, borderLeft: "3px solid #667eea" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#667eea", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>
                    La tua previsione
                    {selectedMd.is_completed && correctCount + wrongCount > 0 && (
                      <span style={{ marginLeft: 10, color: "#888", fontWeight: 400, textTransform: "none" }}>— {correctCount} corrette, {wrongCount} errate</span>
                    )}
                  </div>
                  <div style={{ fontSize: 12, color: "#666" }}>Salvata: {new Date(myPred.updated_at || myPred.submitted_at).toLocaleString("it-IT")}</div>
                </div>
              )}
              {!myPred && selectedMd.is_completed && <div style={{ marginTop: 12 }}><Alert type="error">Non hai inviato la previsione per questa giornata.</Alert></div>}
              {!myPred && !selectedMd.is_completed && now < new Date(selectedMd.deadline) && !selectedMd.is_frozen && <div style={{ marginTop: 12 }}><Alert type="warning">Non hai ancora inviato la previsione! Vai alla Home.</Alert></div>}
            </Card>
            <Card>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#888", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14 }}>Partite ({matches.length})</div>
              {loadingMatch ? <div style={{ display: "flex", justifyContent: "center", padding: 30 }}><Spinner size={28} /></div> : (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {matches.map(m => {
                    const myPick = myPickMap[m.id];
                    const correct = m.is_played && myPick && myPick === m.result;
                    const wrong   = m.is_played && myPick && myPick !== m.result;
                    return (
                      <div key={m.id} style={{ borderRadius: 10, overflow: "hidden", border: correct ? "1px solid #bbf7d0" : wrong ? "1px solid #fecaca" : "1px solid #f0f0f0", background: correct ? "#f0fdf4" : wrong ? "#fef2f2" : "#fafafa" }}>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 8, padding: "12px 16px" }}>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontWeight: 700, color: "#1a1a2e", fontSize: 15 }}>{m.home_name}</div>
                            {m.is_played && <div style={{ fontSize: 11, color: "#aaa", marginTop: 2 }}>FP {m.home_fantapunti}</div>}
                          </div>
                          <div style={{ textAlign: "center", minWidth: 90 }}>
                            {m.is_played ? (
                              <div>
                                <div style={{ fontFamily: "Rajdhani,sans-serif", fontSize: 26, fontWeight: 700, color: "#1a1a2e", lineHeight: 1 }}>{m.home_goals} – {m.away_goals}</div>
                                <div style={{ marginTop: 4 }}><ResultPill result={m.result} /></div>
                              </div>
                            ) : <div style={{ color: "#ccc", fontWeight: 600, fontSize: 14 }}>vs</div>}
                          </div>
                          <div style={{ textAlign: "left" }}>
                            <div style={{ fontWeight: 700, color: "#1a1a2e", fontSize: 15 }}>{m.away_name}</div>
                            {m.is_played && <div style={{ fontSize: 11, color: "#aaa", marginTop: 2 }}>FP {m.away_fantapunti}</div>}
                          </div>
                        </div>
                        {myPick && (
                          <div style={{ padding: "6px 16px 8px", borderTop: "1px dashed #e8e8e8", display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
                            <span style={{ color: "#888" }}>La tua previsione:</span>
                            <ResultPill result={myPick} />
                            {correct && <span style={{ color: "#10b981", fontWeight: 700 }}>✓ Corretta!</span>}
                            {wrong   && <span style={{ color: "#ef4444", fontWeight: 700 }}>✗ Errata</span>}
                            {!m.is_played && <span style={{ color: "#aaa" }}>In attesa</span>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                  {matches.length === 0 && <div style={{ color: "#bbb", textAlign: "center", padding: 20 }}>Nessuna partita disponibile</div>}
                </div>
              )}
            </Card>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Admin Page ────────────────────────────────────────────────────────────────
function AdminPage({ user }) {
  const [tab, setTab] = useState("overview");
  const [submissions, setSubmissions] = useState([]);
  const [matchdays, setMatchdays] = useState([]);
  const [users, setUsers] = useState([]);
  const [selectedMd, setSelectedMd] = useState(null);
  const [loading, setLoading] = useState(true);
  const [scores, setScores] = useState({});
  const [scoreNotes, setScoreNotes] = useState({});
  const [savingScore, setSavingScore] = useState({});
  const [scoreSaved, setScoreSaved] = useState({});
  const [audit, setAudit] = useState([]);
  const [passwords, setPasswords] = useState({});
  const [pwResult, setPwResult] = useState({});

  useEffect(() => {
    (async () => {
      const [mds, usrs] = await Promise.all([
        db.select("matchdays", "?order=number.asc&select=id,number,deadline,is_completed,is_frozen"),
        db.select("league_users", "?is_admin=eq.false&select=id,username,display_name&order=display_name.asc"),
      ]);
      setMatchdays(mds || []);
      setUsers(usrs || []);
      if (mds && mds.length > 0) {
        const current = mds.find(m => !m.is_completed) || mds[mds.length - 1];
        setSelectedMd(current);
      }
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    if (!selectedMd) return;
    (async () => {
      const subs = await db.select("predictions", `?matchday_id=eq.${selectedMd.id}&select=id,prediction_text,submitted_at,updated_at,is_locked,score,score_notes,user_id,league_users(display_name,username)&order=submitted_at.asc`);
      setSubmissions(subs || []);
      const initScores = {};
      const initNotes = {};
      (subs || []).forEach(s => {
        initScores[s.id] = s.score != null ? String(s.score) : "";
        initNotes[s.id] = s.score_notes || "";
      });
      setScores(initScores);
      setScoreNotes(initNotes);
    })();
  }, [selectedMd]);

  useEffect(() => {
    if (tab !== "audit") return;
    (async () => {
      const logs = await db.select("submission_audit_log", "?order=logged_at.desc&limit=100&select=*,league_users(display_name),matchdays(number)");
      setAudit(logs || []);
    })();
  }, [tab]);

  const saveScore = async (predId) => {
    setSavingScore(s => ({ ...s, [predId]: true }));
    try {
      const score = scores[predId] !== "" ? parseFloat(scores[predId]) : null;
      await db.update("predictions", { score, score_notes: scoreNotes[predId] || null }, `?id=eq.${predId}`);
      setScoreSaved(s => ({ ...s, [predId]: true }));
      setTimeout(() => setScoreSaved(s => ({ ...s, [predId]: false })), 3000);
    } catch (err) { alert("Errore: " + err.message); }
    finally { setSavingScore(s => ({ ...s, [predId]: false })); }
  };

  const toggleLock = async (pred) => {
    await db.update("predictions", { is_locked: !pred.is_locked }, `?id=eq.${pred.id}`);
    setSubmissions(ss => ss.map(s => s.id === pred.id ? { ...s, is_locked: !s.is_locked } : s));
  };

  const toggleFreeze = async (md) => {
    const newFrozen = !md.is_frozen;
    await db.update("matchdays", { is_frozen: newFrozen }, `?id=eq.${md.id}`);
    setMatchdays(mds => mds.map(m => m.id === md.id ? { ...m, is_frozen: newFrozen } : m));
    if (selectedMd?.id === md.id) setSelectedMd(m => ({ ...m, is_frozen: newFrozen }));
  };

  const completeMd = async () => {
    if (!confirm(`Completare Giornata ${selectedMd.number}? Tutte le previsioni verranno bloccate.`)) return;
    await db.update("matchdays", { is_completed: true, is_frozen: false }, `?id=eq.${selectedMd.id}`);
    await db.update("predictions", { is_locked: true }, `?matchday_id=eq.${selectedMd.id}`);
    setMatchdays(mds => mds.map(m => m.id === selectedMd.id ? { ...m, is_completed: true, is_frozen: false } : m));
    setSelectedMd(md => ({ ...md, is_completed: true, is_frozen: false }));
  };

  const changePassword = async (userId) => {
    const pwd = passwords[userId];
    if (!pwd || pwd.length < 6) { alert("Password minimo 6 caratteri"); return; }
    setPwResult(r => ({ ...r, [userId]: "saving" }));
    try {
      await db.rpc("change_user_password", { target_user_id: userId, new_password: pwd });
      setPwResult(r => ({ ...r, [userId]: "saved" }));
      setPasswords(p => ({ ...p, [userId]: "" }));
      setTimeout(() => setPwResult(r => ({ ...r, [userId]: null })), 3000);
    } catch (err) { setPwResult(r => ({ ...r, [userId]: "error" })); alert("Errore: " + err.message); }
  };

  const submittedIds = submissions.map(s => s.user_id);
  const missingUsers = users.filter(u => !submittedIds.includes(u.id));
  const now = new Date();

  if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={40} /></div>;

  const tabs = [
    { id: "overview", label: "Previsioni" },
    { id: "scores",   label: "Punteggi" },
    { id: "matchdays",label: "Giornate" },
    { id: "audit",    label: "Audit log" },
    { id: "passwords",label: "Password" },
  ];

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
        <h1 style={{ fontFamily: "Rajdhani,sans-serif", fontSize: 32, fontWeight: 700, color: "#1a1a2e", margin: 0 }}>Admin Panel</h1>
        <Badge color="red">Admin</Badge>
      </div>
      <p style={{ color: "#888", margin: "0 0 24px" }}>Gestione completa della lega</p>

      <div style={{ display: "flex", gap: 4, borderBottom: "2px solid #f0f0f0", marginBottom: 24 }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding: "10px 16px", border: "none", background: "none", cursor: "pointer",
            fontSize: 14, fontWeight: tab === t.id ? 600 : 400, color: tab === t.id ? "#667eea" : "#888",
            borderBottom: tab === t.id ? "2px solid #667eea" : "2px solid transparent",
            marginBottom: -2, fontFamily: "inherit",
          }}>{t.label}</button>
        ))}
      </div>

      {(tab === "overview" || tab === "scores") && (
        <div style={{ marginBottom: 20, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <span style={{ fontSize: 14, color: "#888" }}>Giornata:</span>
          <select value={selectedMd?.id || ""} onChange={e => setSelectedMd(matchdays.find(m => m.id === e.target.value))}
            style={{ padding: "8px 12px", border: "1px solid #e0e0e0", borderRadius: 8, fontSize: 14, fontFamily: "inherit", outline: "none" }}>
            {matchdays.map(md => (
              <option key={md.id} value={md.id}>G{md.number} {md.is_completed ? "(✓)" : md.is_frozen ? "(🧊)" : ""}</option>
            ))}
          </select>
          {selectedMd && !selectedMd.is_completed && (
            <>
              <button className="btn btn-primary" onClick={() => toggleFreeze(selectedMd)}
                style={{ background: selectedMd.is_frozen ? "#059669" : "#1565c0" }}>
                {selectedMd.is_frozen ? "🧊 Scongela giornata" : "🧊 Congela giornata"}
              </button>
              <button className="btn btn-primary" onClick={completeMd} style={{ background: "#ef4444" }}>
                🔒 Chiudi giornata
              </button>
            </>
          )}
        </div>
      )}

      {tab === "overview" && selectedMd && (
        <div>
          <div style={{ display: "flex", gap: 16, marginBottom: 20 }}>
            <div className="stat-card" style={{ flex: 1 }}><div style={{ fontSize: 24, fontWeight: 700, fontFamily: "Rajdhani,sans-serif", color: "#10b981" }}>{submissions.length}</div><div style={{ fontSize: 13, color: "#888" }}>Previsioni inviate</div></div>
            <div className="stat-card" style={{ flex: 1 }}><div style={{ fontSize: 24, fontWeight: 700, fontFamily: "Rajdhani,sans-serif", color: "#ef4444" }}>{missingUsers.length}</div><div style={{ fontSize: 13, color: "#888" }}>Partecipanti mancanti</div></div>
            <div className="stat-card" style={{ flex: 1 }}><div style={{ fontSize: 24, fontWeight: 700, fontFamily: "Rajdhani,sans-serif", color: selectedMd.is_frozen ? "#1565c0" : "#667eea" }}>{selectedMd.is_frozen ? "🧊 Congelata" : selectedMd.is_completed ? "✓ Completa" : "Aperta"}</div><div style={{ fontSize: 13, color: "#888" }}>Stato giornata</div></div>
          </div>
          {missingUsers.length > 0 && <div style={{ marginBottom: 16 }}><Alert type="warning">Non hanno inviato: {missingUsers.map(u => u.display_name).join(", ")}</Alert></div>}
          <Card>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ borderBottom: "2px solid #f0f0f0" }}>
                  {["UTENTE", "PREVISIONE", "INVIATA", "PUNTEGGIO", "STATO", "AZIONI"].map(h => (
                    <th key={h} style={{ textAlign: "left", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {submissions.map(s => (
                  <tr key={s.id} className="table-row" style={{ borderBottom: "1px solid #f5f5f5" }}>
                    <td style={{ padding: "12px 12px" }}><div style={{ fontWeight: 600, color: "#1a1a2e" }}>{s.league_users?.display_name}</div><div style={{ fontSize: 12, color: "#999" }}>{s.league_users?.username}</div></td>
                    <td style={{ padding: "12px 12px", maxWidth: 300 }}><div style={{ fontSize: 12, color: "#444", fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>"{s.prediction_text}"</div></td>
                    <td style={{ padding: "12px 12px", fontSize: 12, color: "#888" }}>{new Date(s.submitted_at).toLocaleString("it-IT", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" })}</td>
                    <td style={{ padding: "12px 12px", fontWeight: 700, color: s.score != null ? "#667eea" : "#ccc", fontFamily: "Rajdhani,sans-serif", fontSize: 16 }}>{s.score != null ? Number(s.score).toFixed(1) : "—"}</td>
                    <td style={{ padding: "12px 12px" }}>{s.is_locked ? <Badge color="red">🔒</Badge> : <Badge color="green">Aperta</Badge>}</td>
                    <td style={{ padding: "12px 12px" }}><button className="btn btn-secondary" onClick={() => toggleLock(s)} style={{ fontSize: 12, padding: "6px 12px" }}>{s.is_locked ? "Sblocca" : "Blocca"}</button></td>
                  </tr>
                ))}
                {missingUsers.map(u => (
                  <tr key={u.id} style={{ background: "#fff8f8", borderBottom: "1px solid #fde8e8" }}>
                    <td colSpan={6} style={{ padding: "12px 12px", color: "#ef4444", fontSize: 14 }}>⚠ {u.display_name} — <em>Nessuna previsione inviata</em></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      )}

      {tab === "scores" && selectedMd && (
        <Card>
          <h2 style={{ margin: "0 0 20px", fontSize: 18, fontWeight: 600, color: "#1a1a2e" }}>Assegna punteggi — G{selectedMd.number}</h2>
          {submissions.length === 0 && <Alert type="info">Nessuna previsione per questa giornata.</Alert>}
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {submissions.map(s => (
              <div key={s.id} style={{ border: "1px solid #e8e8e8", borderRadius: 10, padding: 20 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <div style={{ fontWeight: 600, color: "#1a1a2e", fontSize: 16 }}>{s.league_users?.display_name}</div>
                  {scoreSaved[s.id] && <Badge color="green">✓ Salvato</Badge>}
                </div>
                <div style={{ background: "#f8f9fc", borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: "#444", fontStyle: "italic", borderLeft: "3px solid #667eea" }}>"{s.prediction_text}"</div>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-end", flexWrap: "wrap" }}>
                  <div>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 4 }}>PUNTEGGIO</label>
                    <input type="number" step="0.5" min="0" max="100" value={scores[s.id] || ""} onChange={e => setScores(sc => ({ ...sc, [s.id]: e.target.value }))}
                      style={{ width: 100, padding: "8px 12px", border: "1px solid #e0e0e0", borderRadius: 8, fontSize: 15, fontFamily: "inherit", outline: "none" }} placeholder="es. 8.5" />
                  </div>
                  <div style={{ flex: 1, minWidth: 200 }}>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 4 }}>NOTE</label>
                    <input type="text" value={scoreNotes[s.id] || ""} onChange={e => setScoreNotes(n => ({ ...n, [s.id]: e.target.value }))}
                      style={{ width: "100%", padding: "8px 12px", border: "1px solid #e0e0e0", borderRadius: 8, fontSize: 14, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} placeholder="Note..." />
                  </div>
                  <button className="btn btn-primary" onClick={() => saveScore(s.id)} disabled={savingScore[s.id]}>
                    {savingScore[s.id] ? <><Spinner size={14} /> Salvo...</> : <><Icon name="save" size={14} /> Salva</>}
                  </button>
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {tab === "matchdays" && (
        <Card>
          <h2 style={{ margin: "0 0 16px", fontSize: 18, fontWeight: 600 }}>Stato giornate</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {matchdays.map(md => (
              <div key={md.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0", borderBottom: "1px solid #f0f0f0" }}>
                <span style={{ fontWeight: 500, color: "#1a1a2e" }}>G{md.number}</span>
                <span style={{ fontSize: 13, color: "#888" }}>{new Date(md.deadline).toLocaleString("it-IT")}</span>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  {md.is_frozen && <Badge color="blue">🧊 Congelata</Badge>}
                  {md.is_completed ? <Badge color="gray">✓ Completata</Badge> : now > new Date(md.deadline) ? <Badge color="amber">Scaduta</Badge> : <Badge color="green">Aperta</Badge>}
                  {!md.is_completed && (
                    <button className="btn btn-secondary" onClick={() => toggleFreeze(md)} style={{ fontSize: 12, padding: "5px 10px" }}>
                      {md.is_frozen ? "🧊 Scongela" : "🧊 Congela"}
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {tab === "audit" && (
        <Card>
          <h2 style={{ margin: "0 0 16px", fontSize: 18, fontWeight: 600 }}>Audit log — ultimi 100 eventi</h2>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "2px solid #f0f0f0" }}>
                {["DATA/ORA", "UTENTE", "GIORNATA", "AZIONE", "CONTENUTO"].map(h => (
                  <th key={h} style={{ textAlign: "left", padding: "8px 10px", fontSize: 11, color: "#888", fontWeight: 600 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {audit.map(a => (
                <tr key={a.id} className="table-row" style={{ borderBottom: "1px solid #f8f8f8" }}>
                  <td style={{ padding: "8px 10px", fontSize: 12, color: "#888", whiteSpace: "nowrap" }}>{new Date(a.logged_at).toLocaleString("it-IT")}</td>
                  <td style={{ padding: "8px 10px", fontSize: 13, fontWeight: 500 }}>{a.league_users?.display_name || a.user_id}</td>
                  <td style={{ padding: "8px 10px", fontSize: 13 }}>G{a.matchdays?.number}</td>
                  <td style={{ padding: "8px 10px" }}>
                    <Badge color={a.action === "FAILED" ? "red" : a.action === "CREATE" ? "green" : a.action === "UPDATE" ? "blue" : "gray"}>{a.action}</Badge>
                  </td>
                  <td style={{ padding: "8px 10px", fontSize: 12, color: "#555", maxWidth: 300, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    {a.prediction_text ? `"${a.prediction_text}"` : a.error_message || "—"}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {audit.length === 0 && <div style={{ textAlign: "center", padding: 30, color: "#888" }}>Nessun evento</div>}
        </Card>
      )}

      {tab === "passwords" && (
        <Card>
          <h2 style={{ margin: "0 0 8px", fontSize: 18, fontWeight: 600 }}>Gestione password</h2>
          <p style={{ color: "#888", fontSize: 14, marginBottom: 20 }}>Imposta una nuova password per qualsiasi partecipante</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {users.map(u => (
              <div key={u.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: "1px solid #f0f0f0" }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: "#667eea20", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, color: "#667eea", fontSize: 14 }}>{u.display_name[0]}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 500, color: "#1a1a2e" }}>{u.display_name}</div>
                  <div style={{ fontSize: 12, color: "#999" }}>@{u.username}</div>
                </div>
                <input type="password" placeholder="Nuova password" value={passwords[u.id] || ""} onChange={e => setPasswords(p => ({ ...p, [u.id]: e.target.value }))}
                  style={{ padding: "8px 12px", border: "1px solid #e0e0e0", borderRadius: 8, fontSize: 14, fontFamily: "inherit", outline: "none", width: 180 }} />
                <button className="btn btn-primary" onClick={() => changePassword(u.id)} disabled={pwResult[u.id] === "saving"} style={{ whiteSpace: "nowrap" }}>
                  {pwResult[u.id] === "saving" ? <Spinner size={14} /> : pwResult[u.id] === "saved" ? "✓ Salvata" : "Cambia"}
                </button>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

function App() {
  const state = useStore();
  const [page, setPage] = useState("home");

  // Expose setPage globally for DashboardPage link
  useEffect(() => { window._setPage = setPage; }, []);

  if (state.loading) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0f0c29, #302b63)" }}>
        <div style={{ textAlign: "center", color: "#fff" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>⚽</div>
          <Spinner size={40} />
        </div>
      </div>
    );
  }

  if (!state.auth) return <LoginPage />;

  const { user } = state.auth;

  const pages = {
    home: <HomePage user={user} />,
    standings: <StandingsPage user={user} />,
    calendar: <CalendarPage user={user} />,
    history: <HistoryPage user={user} />,
    admin: user.is_admin ? <AdminPage user={user} /> : <div><Alert type="error">Accesso negato</Alert></div>,
  };

  return (
    <Layout user={user} page={page} setPage={setPage}>
      {pages[page] || pages.dashboard}
    </Layout>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
