// ─── Supabase Client ──────────────────────────────────────────────────────────
class SupabaseClient {
  constructor(url, key) {
    this.url = url;
    this.key = key;
    this.headers = { "Content-Type": "application/json", apikey: key, Authorization: `Bearer ${key}` };
  }

  async query(table, method = "GET", body = null, params = "") {
    const res = await fetch(`${this.url}/rest/v1/${table}${params}`, {
      method,
      headers: this.headers,
      body: body ? JSON.stringify(body) : null,
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    if (method === "DELETE" || res.status === 204) return null;
    return res.json();
  }

  async rpc(fn, body = {}) {
    const res = await fetch(`${this.url}/rest/v1/rpc/${fn}`, {
      method: "POST",
      headers: { ...this.headers, "Prefer": "return=representation" },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    return res.json();
  }

  async select(table, params = "") {
    return this.query(table, "GET", null, params);
  }

  async insert(table, body, opts = "") {
    const res = await fetch(`${this.url}/rest/v1/${table}`, {
      method: "POST",
      headers: { ...this.headers, Prefer: "return=representation" + (opts ? "," + opts : "") },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: res.statusText }));
      throw err;
    }
    return res.json();
  }

  async upsert(table, body, conflict) {
    const res = await fetch(`${this.url}/rest/v1/${table}`, {
      method: "POST",
      headers: { ...this.headers, Prefer: `return=representation,resolution=merge-duplicates` },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(text);
    }
    return res.json();
  }

  async update(table, body, params) {
    const res = await fetch(`${this.url}/rest/v1/${table}${params}`, {
      method: "PATCH",
      headers: { ...this.headers, Prefer: "return=representation" },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(text);
    }
    return res.json();
  }
}

// ─── Auth Helpers ─────────────────────────────────────────────────────────────
async function login(username, password) {
  // Fetch user by username
  const users = await db.select("league_users", `?username=eq.${encodeURIComponent(username)}&select=id,username,display_name,is_admin,password_hash`);
  if (!users || users.length === 0) throw new Error("Utente non trovato");
  const user = users[0];
  // Verify password via RPC — Supabase returns the boolean wrapped in an array e.g. [true]
  const result = await db.rpc("verify_password", { input_password: password, stored_hash: user.password_hash });
  const isValid = Array.isArray(result) ? result[0] : result;
  if (!isValid) throw new Error("Password errata");
  // Create session
  const sessions = await db.insert("sessions", { user_id: user.id });
  const session = sessions[0];
  const userData = { id: user.id, username: user.username, display_name: user.display_name, is_admin: user.is_admin };
  return { token: session.token, user: userData };
}

async function logout(token) {
  await db.update("sessions", { is_active: false }, `?token=eq.${token}`);
}

async function validateSession(token) {
  // Fetch session, then separately fetch user to avoid join issues
  const sessions = await db.select("sessions", `?token=eq.${encodeURIComponent(token)}&is_active=eq.true&expires_at=gt.${new Date().toISOString()}&select=user_id`);
  if (!sessions || sessions.length === 0) return null;
  const userId = sessions[0].user_id;
  const users = await db.select("league_users", `?id=eq.${userId}&select=id,username,display_name,is_admin`);
  if (!users || users.length === 0) return null;
  return users[0];
}

// ─── Prediction Helpers ───────────────────────────────────────────────────────
async function submitPrediction(userId, matchdayId, text, token) {
  // Validate
  if (!text || text.trim().length === 0) throw new Error("La previsione non può essere vuota");

  // Check deadline
  const matchdays = await db.select("matchdays", `?id=eq.${matchdayId}&select=deadline,is_completed`);
  if (!matchdays || matchdays.length === 0) throw new Error("Giornata non trovata");
  const md = matchdays[0];
  if (md.is_completed) throw new Error("Giornata già completata, previsioni bloccate");
  if (new Date() > new Date(md.deadline)) throw new Error("Scadenza superata, previsione bloccata");

  // Check if existing prediction
  const existing = await db.select("predictions", `?user_id=eq.${userId}&matchday_id=eq.${matchdayId}`);

  let result;
  if (existing && existing.length > 0) {
    const pred = existing[0];
    if (pred.is_locked) throw new Error("Previsione bloccata, impossibile modificare");
    result = await db.update("predictions", { prediction_text: text.trim() }, `?user_id=eq.${userId}&matchday_id=eq.${matchdayId}`);
    // Log audit
    await db.insert("submission_audit_log", { user_id: userId, matchday_id: matchdayId, action: "UPDATE", prediction_text: text.trim() }).catch(console.error);
  } else {
    result = await db.insert("predictions", { user_id: userId, matchday_id: matchdayId, prediction_text: text.trim() });
    await db.insert("submission_audit_log", { user_id: userId, matchday_id: matchdayId, action: "CREATE", prediction_text: text.trim() }).catch(console.error);
  }

  if (!result || result.length === 0) {
    await db.insert("submission_audit_log", { user_id: userId, matchday_id: matchdayId, action: "FAILED", error_message: "No result returned" }).catch(console.error);
    throw new Error("Errore nel salvataggio: nessun dato restituito dal server");
  }

  return result[0];
}

// ─── React App ────────────────────────────────────────────────────────────────
const { useState, useEffect, useCallback, useRef } = React;

// ─── State Store (simple global) ──────────────────────────────────────────────
let _listeners = [];
let _state = {
  auth: null, // { token, user }
  loading: true,
};

function getState() { return _state; }
function setState(patch) {
  _state = { ..._state, ...patch };
  _listeners.forEach(fn => fn(_state));
}
function useStore() {
  const [s, setS] = useState(_state);
  useEffect(() => {
    _listeners.push(setS);
    return () => { _listeners = _listeners.filter(f => f !== setS); };
  }, []);
  return s;
}

// ─── Init: restore session ────────────────────────────────────────────────────
(async () => {
  const token = localStorage.getItem("fm_token");
  if (token) {
    try {
      const user = await validateSession(token);
      if (user) { setState({ auth: { token, user }, loading: false }); return; }
    } catch {}
  }
  localStorage.removeItem("fm_token");
  setState({ loading: false });
})();

// ─── Shared helpers ───────────────────────────────────────────────────────────
async function loadMatchesForMatchday(matchdayId) {
  // Fetch matches plain, then fetch all teams once, enrich client-side
  const [rawMatches, allTeams] = await Promise.all([
    db.select("matches", `?matchday_id=eq.${matchdayId}&select=id,home_team_id,away_team_id,home_goals,away_goals,home_fantapunti,away_fantapunti,result,is_played&order=id.asc`),
    db.select("teams", "?select=id,name"),
  ]);
  const teamMap = {};
  (allTeams || []).forEach(t => { teamMap[t.id] = t.name; });
  return (rawMatches || []).map(m => ({
    ...m,
    home_name: teamMap[m.home_team_id] || "?",
    away_name: teamMap[m.away_team_id] || "?",
  }));
}

function buildPredText(picks, matches) {
  return matches.map(m => `${m.home_name} vs ${m.away_name}: ${picks[m.id] || "?"}`).join(" | ");
}

function parsePredText(text, matches) {
  const picks = {};
  if (!text) return picks;
  text.split(" | ").forEach(part => {
    const rx = /^(.+) vs (.+): ([1X2?])$/.exec(part);
    if (!rx) return;
    const found = matches.find(m => m.home_name === rx[1] && m.away_name === rx[2]);
    if (found) picks[found.id] = rx[3];
  });
  return picks;
}

function PickBtn({ value, selected, disabled, onPick }) {
  const bg = { "1": "#2e7d32", "X": "#e65100", "2": "#1565c0" };
  return (
    <button onClick={onPick} disabled={disabled} style={{
      width: 42, height: 34, borderRadius: 7, border: selected ? "none" : "1.5px solid #ddd",
      background: selected ? bg[value] : "#f5f5f5",
      color: selected ? "#fff" : "#666",
      fontWeight: 700, fontSize: 13, cursor: disabled ? "not-allowed" : "pointer",
      opacity: disabled ? 0.5 : 1, fontFamily: "inherit", transition: "all 0.1s",
    }}>{value}</button>
  );
}

function ResultPill({ result }) {
  const s = { "1": { bg: "#e8f5e9", color: "#2e7d32" }, "X": { bg: "#fff8e1", color: "#e65100" }, "2": { bg: "#e3f2fd", color: "#1565c0" } };
  const c = s[result] || { bg: "#f5f5f5", color: "#999" };
  return <span style={{ background: c.bg, color: c.color, fontWeight: 700, fontSize: 13, padding: "2px 10px", borderRadius: 20, display: "inline-block", minWidth: 28, textAlign: "center" }}>{result || "—"}</span>;
}

// ─── Predictions Page ─────────────────────────────────────────────────────────
function PredictionsPage({ user }) {
  const [allMatchdays, setAllMatchdays]   = useState([]);
  const [selectedMd,   setSelectedMd]    = useState(null);
  const [matches,      setMatches]       = useState([]);
  const [picks,        setPicks]         = useState({});
  const [savedPred,    setSavedPred]     = useState(null);
  const [saveState,    setSaveState]     = useState("idle"); // idle|saving|saved|error
  const [saveError,    setSaveError]     = useState("");
  const [loadingMds,   setLoadingMds]    = useState(true);
  const [loadingMatches, setLoadingMatches] = useState(false);

  // Load ALL matchdays once on mount
  useEffect(() => {
    (async () => {
      const mds = await db.select("matchdays", "?order=number.asc&select=id,number,deadline,is_completed");
      setAllMatchdays(mds || []);
      // Auto-select the first genuinely open one
      const now = new Date();
      const open = (mds || []).filter(m => !m.is_completed && new Date(m.deadline) > now);
      if (open.length > 0) setSelectedMd(open[0]);
      setLoadingMds(false);
    })();
  }, []);

  // Load matches + existing prediction whenever matchday changes
  useEffect(() => {
    if (!selectedMd) return;
    setLoadingMatches(true);
    setMatches([]);
    setPicks({});
    setSavedPred(null);
    setSaveState("idle");

    (async () => {
      const [enriched, preds] = await Promise.all([
        loadMatchesForMatchday(selectedMd.id),
        db.select("predictions", `?user_id=eq.${user.id}&matchday_id=eq.${selectedMd.id}`),
      ]);
      setMatches(enriched);
      if (preds && preds.length > 0) {
        const p = preds[0];
        setSavedPred(p);
        setPicks(parsePredText(p.prediction_text, enriched));
        setSaveState("saved");
      }
      setLoadingMatches(false);
    })();
  }, [selectedMd?.id]);

  const now         = new Date();
  const isExpired   = selectedMd ? now > new Date(selectedMd.deadline) : false;
  const isCompleted = selectedMd?.is_completed;
  const isLocked    = savedPred?.is_locked;
  const canEdit     = selectedMd && !isExpired && !isCompleted && !isLocked;
  const totalPicks  = matches.filter(m => picks[m.id]).length;
  const allPicked   = matches.length > 0 && totalPicks === matches.length;
  const predText    = buildPredText(picks, matches);
  const hasChanged  = savedPred ? predText !== savedPred.prediction_text : allPicked;

  const nowOpen = allMatchdays.filter(m => !m.is_completed && new Date(m.deadline) > now);

  const handleSave = async () => {
    if (!canEdit || !allPicked) return;
    setSaveState("saving");
    setSaveError("");
    try {
      const result = await submitPrediction(user.id, selectedMd.id, predText);
      setSavedPred(result);
      setSaveState("saved");
    } catch (err) {
      setSaveState("error");
      setSaveError(err.message || "Errore nel salvataggio");
    }
  };

  const minsLeft = selectedMd ? Math.max(0, Math.floor((new Date(selectedMd.deadline) - now) / 60000)) : 0;

  if (loadingMds) return <div style={{ display:"flex", justifyContent:"center", padding:60 }}><Spinner size={40}/></div>;

  return (
    <div>
      <h1 style={{ fontFamily:"Rajdhani,sans-serif", fontSize:32, fontWeight:700, color:"#1a1a2e", margin:"0 0 4px" }}>Previsioni</h1>
      <p style={{ color:"#888", margin:"0 0 28px" }}>Scegli 1, X o 2 per ogni partita prima della deadline</p>

      {nowOpen.length === 0 && (
        <Alert type="info">Nessuna giornata aperta al momento — tutte le giornate future sono ancora da aprire oppure già scadute.</Alert>
      )}

      {nowOpen.length > 0 && (
        <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:24, alignItems:"start" }}>

          {/* ── Left: matchday list ── */}
          <div>
            <div style={{ fontSize:11, fontWeight:600, color:"#888", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:10 }}>Giornate aperte</div>
            {nowOpen.map(md => {
              const ddl = new Date(md.deadline);
              const mins = Math.max(0, Math.floor((ddl - now) / 60000));
              const urgent = mins < 60;
              const isSelected = selectedMd?.id === md.id;
              return (
                <div key={md.id} onClick={() => setSelectedMd(md)}
                  style={{
                    padding:"12px 14px", borderRadius:10, cursor:"pointer", marginBottom:6,
                    background: isSelected ? "#f0f1ff" : "#fff",
                    border: isSelected ? "1.5px solid #667eea" : "1.5px solid #e8e8e8",
                    transition:"all 0.12s",
                  }}>
                  <div style={{ fontWeight:700, fontSize:15, color:"#1a1a2e" }}>Giornata {md.number}</div>
                  <div style={{ fontSize:11, color: urgent ? "#ef4444" : "#999", marginTop:3 }}>
                    {urgent ? `⚠ ${mins} min` : `${Math.floor(mins/60)}h ${mins%60}m`} alla scadenza
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── Right: prediction form ── */}
          <div>
            {!selectedMd && (
              <Card><Alert type="info">Seleziona una giornata a sinistra.</Alert></Card>
            )}

            {selectedMd && (
              <>
                {/* Status bar */}
                <Card style={{ marginBottom:14 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <div style={{ fontFamily:"Rajdhani,sans-serif", fontSize:20, fontWeight:700, color:"#1a1a2e" }}>Giornata {selectedMd.number}</div>
                      <div style={{ fontSize:13, color:"#888", marginTop:2 }}>
                        Deadline: {new Date(selectedMd.deadline).toLocaleString("it-IT")}
                      </div>
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:5 }}>
                      {saveState === "saved" && <Badge color="green">✓ Salvata</Badge>}
                      {saveState === "error"  && <Badge color="red">⚠ Errore</Badge>}
                      {saveState === "idle" && allPicked && <Badge color="blue">Pronta</Badge>}
                      {saveState === "idle" && !allPicked && <Badge color="amber">Incompleta</Badge>}
                      {saveState === "saving" && <Badge color="gray">Salvataggio...</Badge>}
                      {saveState === "saved" && savedPred && (
                        <div style={{ fontSize:11, color:"#aaa" }}>{new Date(savedPred.updated_at).toLocaleString("it-IT")}</div>
                      )}
                    </div>
                  </div>
                  {saveState === "saved" && !hasChanged && (
                    <div style={{ marginTop:10 }}>
                      <Alert type="success">✓ Previsione salvata — {new Date(savedPred.updated_at).toLocaleString("it-IT")}</Alert>
                    </div>
                  )}
                  {saveState === "error" && (
                    <div style={{ marginTop:10 }}><Alert type="error">⚠ {saveError}</Alert></div>
                  )}
                </Card>

                {/* Match picker */}
                <Card>
                  {loadingMatches ? (
                    <div style={{ display:"flex", justifyContent:"center", padding:40 }}><Spinner size={32}/></div>
                  ) : matches.length === 0 ? (
                    <Alert type="info">Nessuna partita caricata per questa giornata.</Alert>
                  ) : (
                    <>
                      <div style={{ fontSize:11, fontWeight:600, color:"#888", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:14 }}>
                        Seleziona il risultato — {totalPicks}/{matches.length} partite
                      </div>

                      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                        {matches.map((m, i) => {
                          const pick = picks[m.id];
                          const done = Boolean(pick);
                          return (
                            <div key={m.id} style={{
                              display:"grid", gridTemplateColumns:"1fr auto 1fr auto", alignItems:"center", gap:10,
                              padding:"11px 14px", borderRadius:10,
                              background: done ? "#f7f8ff" : "#fafafa",
                              border: done ? "1.5px solid #667eea30" : "1.5px solid #f0f0f0",
                            }}>
                              <div style={{ fontWeight:700, color:"#1a1a2e", fontSize:14, textAlign:"right", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                                {m.home_name}
                              </div>
                              <div style={{ display:"flex", gap:5, justifyContent:"center", flexShrink:0 }}>
                                {["1","X","2"].map(v => (
                                  <PickBtn key={v} value={v} selected={pick===v} disabled={!canEdit}
                                    onPick={() => {
                                      if (!canEdit) return;
                                      setPicks(p => ({ ...p, [m.id]: v }));
                                      if (saveState === "saved") setSaveState("idle");
                                    }}
                                  />
                                ))}
                              </div>
                              <div style={{ fontWeight:700, color:"#1a1a2e", fontSize:14, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                                {m.away_name}
                              </div>
                              <div style={{ width:34, flexShrink:0, textAlign:"right" }}>
                                {pick ? <ResultPill result={pick}/> : <span style={{ color:"#ddd", fontSize:18 }}>○</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      <div style={{ marginTop:18, borderTop:"1px solid #f0f0f0", paddingTop:14, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ fontSize:13, color: allPicked ? "#10b981" : "#f59e0b", fontWeight:500 }}>
                          {allPicked ? "✓ Tutte le partite selezionate" : `Ancora ${matches.length - totalPicks} ${matches.length - totalPicks === 1 ? "partita" : "partite"} da selezionare`}
                        </span>
                        {canEdit && (
                          <div style={{ display:"flex", gap:8 }}>
                            {savedPred && saveState !== "saved" && (
                              <button className="btn btn-secondary" onClick={() => { setPicks(parsePredText(savedPred.prediction_text, matches)); setSaveState("saved"); }}>
                                Annulla
                              </button>
                            )}
                            <button className="btn btn-primary" onClick={handleSave}
                              disabled={saveState==="saving" || !allPicked || !hasChanged}>
                              {saveState==="saving"
                                ? <><Spinner size={15}/> Salvo...</>
                                : <><Icon name="save" size={15}/> {savedPred ? "Aggiorna" : "Salva"}</>}
                            </button>
                          </div>
                        )}
                        {!canEdit && (
                          <Badge color="red">🔒 {isExpired ? "Scaduta" : isCompleted ? "Giornata completata" : "Bloccata"}</Badge>
                        )}
                      </div>
                    </>
                  )}
                </Card>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Calendar Page ─────────────────────────────────────────────────────────────
function CalendarPage({ user }) {
  const [allMatchdays, setAllMatchdays] = useState([]);
  const [selectedMd,   setSelectedMd]  = useState(null);
  const [matches,      setMatches]     = useState([]);
  const [teamMap,      setTeamMap]     = useState({});
  const [myPreds,      setMyPreds]     = useState({});
  const [loadingMds,   setLoadingMds]  = useState(true);
  const [loadingMatch, setLoadingMatch]= useState(false);
  const [filter,       setFilter]      = useState("all"); // all | played | upcoming

  // Load matchdays, teams, and my predictions all at once
  useEffect(() => {
    (async () => {
      const [mds, teams, preds] = await Promise.all([
        db.select("matchdays", "?order=number.asc&select=id,number,deadline,is_completed"),
        db.select("teams", "?select=id,name,color"),
        db.select("predictions", `?user_id=eq.${user.id}&select=matchday_id,prediction_text,score,score_notes,submitted_at,updated_at`),
      ]);
      const tm = {};
      (teams || []).forEach(t => { tm[t.id] = t; });
      const pm = {};
      (preds || []).forEach(p => { pm[p.matchday_id] = p; });
      setTeamMap(tm);
      setMyPreds(pm);
      setAllMatchdays(mds || []);
      // Default to last completed matchday
      const completed = (mds || []).filter(m => m.is_completed);
      const fallback  = (mds || []).find(m => !m.is_completed);
      setSelectedMd(completed[completed.length - 1] || fallback || null);
      setLoadingMds(false);
    })();
  }, [user.id]);

  // Load matches when selected matchday changes
  useEffect(() => {
    if (!selectedMd) return;
    setLoadingMatch(true);
    setMatches([]);
    (async () => {
      const enriched = await loadMatchesForMatchday(selectedMd.id);
      setMatches(enriched);
      setLoadingMatch(false);
    })();
  }, [selectedMd?.id]);

  const now = new Date();

  const visibleMatchdays = allMatchdays.filter(md => {
    if (filter === "played")   return md.is_completed;
    if (filter === "upcoming") return !md.is_completed;
    return true;
  });

  // Parse my picks for selected matchday
  const myPred = myPreds[selectedMd?.id];
  const myPickMap = {};
  if (myPred && matches.length > 0) {
    parsePredText(myPred.prediction_text, matches); // reuse helper
    myPred.prediction_text?.split(" | ").forEach(part => {
      const rx = /^(.+) vs (.+): ([1X2?])$/.exec(part);
      if (!rx) return;
      const m = matches.find(mx => mx.home_name === rx[1] && mx.away_name === rx[2]);
      if (m) myPickMap[m.id] = rx[3];
    });
  }

  // Count correct picks
  const correctCount = matches.filter(m => m.is_played && myPickMap[m.id] && myPickMap[m.id] === m.result).length;
  const wrongCount   = matches.filter(m => m.is_played && myPickMap[m.id] && myPickMap[m.id] !== m.result).length;

  if (loadingMds) return <div style={{ display:"flex", justifyContent:"center", padding:60 }}><Spinner size={40}/></div>;

  return (
    <div>
      <h1 style={{ fontFamily:"Rajdhani,sans-serif", fontSize:32, fontWeight:700, color:"#1a1a2e", margin:"0 0 4px" }}>Calendario</h1>
      <p style={{ color:"#888", margin:"0 0 20px" }}>Tutti i risultati e le partite della stagione</p>

      {/* Filter tabs */}
      <div style={{ display:"flex", gap:6, marginBottom:24 }}>
        {[["all","Tutte (38)"],["played","Giocate"],["upcoming","In arrivo"]].map(([v,label]) => (
          <button key={v} onClick={() => setFilter(v)} style={{
            padding:"7px 16px", borderRadius:20, border:"1.5px solid",
            borderColor: filter===v ? "#667eea" : "#e0e0e0",
            background: filter===v ? "#667eea" : "#fff",
            color: filter===v ? "#fff" : "#666",
            fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit",
          }}>{label}</button>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"170px 1fr", gap:24, alignItems:"start" }}>

        {/* ── Left: scrollable matchday list ── */}
        <div style={{ maxHeight:"75vh", overflowY:"auto", paddingRight:4 }}>
          {visibleMatchdays.map(md => {
            const pred   = myPreds[md.id];
            const ddl    = new Date(md.deadline);
            const isOpen = !md.is_completed && now < ddl;
            const isSelected = selectedMd?.id === md.id;
            return (
              <div key={md.id} onClick={() => setSelectedMd(md)} style={{
                padding:"10px 12px", borderRadius:9, cursor:"pointer", marginBottom:5,
                background: isSelected ? "#f0f1ff" : "#fff",
                border: isSelected ? "1.5px solid #667eea" : "1.5px solid #e8e8e8",
                transition:"all 0.1s",
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontWeight:700, fontSize:14, color:"#1a1a2e" }}>G{md.number}</span>
                  {md.is_completed
                    ? <span style={{ fontSize:10, color:"#888" }}>✓</span>
                    : isOpen
                      ? <span style={{ fontSize:10, color:"#10b981", fontWeight:700 }}>OPEN</span>
                      : <span style={{ fontSize:10, color:"#ccc" }}>—</span>}
                </div>
                {pred ? (
                  pred.score != null
                    ? <div style={{ fontSize:11, color:"#667eea", fontWeight:600, marginTop:2 }}>⭐ {Number(pred.score).toFixed(1)} pt</div>
                    : <div style={{ fontSize:11, color:"#10b981", marginTop:2 }}>✓ Inviata</div>
                ) : md.is_completed ? (
                  <div style={{ fontSize:11, color:"#ef4444", marginTop:2 }}>✗ Mancante</div>
                ) : null}
              </div>
            );
          })}
          {visibleMatchdays.length === 0 && <div style={{ color:"#bbb", fontSize:13, padding:10 }}>Nessuna giornata</div>}
        </div>

        {/* ── Right: selected matchday detail ── */}
        {selectedMd && (
          <div>
            {/* Header */}
            <Card style={{ marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontFamily:"Rajdhani,sans-serif", fontSize:24, fontWeight:700, color:"#1a1a2e" }}>
                    Giornata {selectedMd.number}
                  </div>
                  <div style={{ fontSize:13, color:"#888", marginTop:2 }}>
                    {new Date(selectedMd.deadline).toLocaleString("it-IT")}
                  </div>
                </div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", justifyContent:"flex-end" }}>
                  {selectedMd.is_completed
                    ? <Badge color="gray">Completata</Badge>
                    : now < new Date(selectedMd.deadline)
                      ? <Badge color="green">Aperta</Badge>
                      : <Badge color="amber">Chiusa</Badge>}
                  {myPred?.score != null && <Badge color="purple">⭐ {Number(myPred.score).toFixed(1)} pt</Badge>}
                </div>
              </div>

              {/* My prediction summary */}
              {myPred && (
                <div style={{ marginTop:14, padding:"10px 14px", background:"#f7f8ff", borderRadius:8, borderLeft:"3px solid #667eea" }}>
                  <div style={{ fontSize:11, fontWeight:600, color:"#667eea", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:4 }}>
                    La tua previsione
                    {selectedMd.is_completed && matches.length > 0 && Object.keys(myPickMap).length > 0 && (
                      <span style={{ marginLeft:10, color:"#888", fontWeight:400, textTransform:"none" }}>
                        — {correctCount} corrette, {wrongCount} errate
                      </span>
                    )}
                  </div>
                  <div style={{ fontSize:12, color:"#666" }}>
                    Salvata: {new Date(myPred.updated_at || myPred.submitted_at).toLocaleString("it-IT")}
                  </div>
                  {myPred.score_notes && (
                    <div style={{ fontSize:12, color:"#888", marginTop:4, fontStyle:"italic" }}>Note: {myPred.score_notes}</div>
                  )}
                </div>
              )}
              {!myPred && selectedMd.is_completed && (
                <div style={{ marginTop:12 }}><Alert type="error">Non hai inviato la previsione per questa giornata.</Alert></div>
              )}
              {!myPred && !selectedMd.is_completed && now < new Date(selectedMd.deadline) && (
                <div style={{ marginTop:12 }}><Alert type="warning">Non hai ancora inviato la previsione! Vai alla pagina Previsioni.</Alert></div>
              )}
            </Card>

            {/* Matches */}
            <Card>
              <div style={{ fontSize:11, fontWeight:600, color:"#888", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:14 }}>
                Partite ({matches.length})
              </div>
              {loadingMatch ? (
                <div style={{ display:"flex", justifyContent:"center", padding:30 }}><Spinner size={28}/></div>
              ) : matches.length === 0 ? (
                <div style={{ color:"#bbb", textAlign:"center", padding:20, fontSize:14 }}>Nessuna partita disponibile</div>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {matches.map(m => {
                    const myPick  = myPickMap[m.id];
                    const correct = m.is_played && myPick && myPick === m.result;
                    const wrong   = m.is_played && myPick && myPick !== m.result;
                    return (
                      <div key={m.id} style={{
                        borderRadius:10, overflow:"hidden",
                        border: correct ? "1px solid #bbf7d0" : wrong ? "1px solid #fecaca" : "1px solid #f0f0f0",
                        background: correct ? "#f0fdf4" : wrong ? "#fef2f2" : "#fafafa",
                      }}>
                        {/* Main row */}
                        <div style={{ display:"grid", gridTemplateColumns:"1fr auto 1fr", alignItems:"center", gap:8, padding:"12px 16px" }}>
                          {/* Home */}
                          <div style={{ textAlign:"right" }}>
                            <div style={{ fontWeight:700, color:"#1a1a2e", fontSize:15 }}>{m.home_name}</div>
                            {m.is_played && <div style={{ fontSize:11, color:"#aaa", marginTop:2 }}>FP {m.home_fantapunti}</div>}
                          </div>
                          {/* Score */}
                          <div style={{ textAlign:"center", minWidth:90 }}>
                            {m.is_played ? (
                              <div>
                                <div style={{ fontFamily:"Rajdhani,sans-serif", fontSize:26, fontWeight:700, color:"#1a1a2e", lineHeight:1 }}>
                                  {m.home_goals} – {m.away_goals}
                                </div>
                                <div style={{ marginTop:4 }}><ResultPill result={m.result}/></div>
                              </div>
                            ) : (
                              <div style={{ color:"#ccc", fontWeight:600, fontSize:14 }}>vs</div>
                            )}
                          </div>
                          {/* Away */}
                          <div style={{ textAlign:"left" }}>
                            <div style={{ fontWeight:700, color:"#1a1a2e", fontSize:15 }}>{m.away_name}</div>
                            {m.is_played && <div style={{ fontSize:11, color:"#aaa", marginTop:2 }}>FP {m.away_fantapunti}</div>}
                          </div>
                        </div>
                        {/* My pick row */}
                        {myPick && (
                          <div style={{ padding:"6px 16px 8px", borderTop: "1px dashed #e8e8e8", display:"flex", alignItems:"center", gap:8, fontSize:12 }}>
                            <span style={{ color:"#888" }}>La tua previsione:</span>
                            <ResultPill result={myPick}/>
                            {correct && <span style={{ color:"#10b981", fontWeight:700 }}>✓ Corretta!</span>}
                            {wrong   && <span style={{ color:"#ef4444", fontWeight:700 }}>✗ Errata</span>}
                            {!m.is_played && <span style={{ color:"#aaa" }}>In attesa del risultato</span>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Standings Page ────────────────────────────────────────────────────────────
function StandingsPage({ user }) {
  const [standings, setStandings] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      const [users, predictions] = await Promise.all([
        db.select("league_users", "?is_admin=eq.false&select=id,display_name,username"),
        db.select("predictions", "?score=not.is.null&select=user_id,score"),
      ]);
      const scoreMap = {};
      predictions.forEach(p => {
        if (!scoreMap[p.user_id]) scoreMap[p.user_id] = { total: 0, count: 0 };
        scoreMap[p.user_id].total += Number(p.score);
        scoreMap[p.user_id].count += 1;
      });
      const ranked = users.map(u => ({
        ...u,
        total: scoreMap[u.id]?.total || 0,
        count: scoreMap[u.id]?.count || 0,
        avg: scoreMap[u.id] ? (scoreMap[u.id].total / scoreMap[u.id].count).toFixed(2) : "—",
      })).sort((a, b) => b.total - a.total);
      setStandings(ranked);
      setLoading(false);
    })();
  }, []);

  if (loading) return <div style={{ display:"flex", justifyContent:"center", padding:60 }}><Spinner size={40}/></div>;

  return (
    <div>
      <h1 style={{ fontFamily:"Rajdhani,sans-serif", fontSize:32, fontWeight:700, color:"#1a1a2e", margin:"0 0 4px" }}>Classifica</h1>

      <Card>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ borderBottom:"2px solid #f0f0f0" }}>
              <th style={{ textAlign:"left", padding:"10px 12px", fontSize:12, color:"#888", fontWeight:600, width:50 }}>#</th>
              <th style={{ textAlign:"left", padding:"10px 12px", fontSize:12, color:"#888", fontWeight:600 }}>PARTECIPANTE</th>
              <th style={{ textAlign:"center", padding:"10px 12px", fontSize:12, color:"#888", fontWeight:600 }}>PREV.</th>
              <th style={{ textAlign:"center", padding:"10px 12px", fontSize:12, color:"#888", fontWeight:600 }}>MEDIA</th>
              <th style={{ textAlign:"right", padding:"10px 12px", fontSize:12, color:"#888", fontWeight:600 }}>PUNTI TOT.</th>
            </tr>
          </thead>
          <tbody>
            {standings.map((s, i) => (
              <tr key={s.id} className="table-row" style={{ borderBottom:"1px solid #f5f5f5", background: s.id===user.id ? "#f7f8ff" : "transparent" }}>
                <td style={{ padding:"14px 12px", fontWeight:700, color:i<3?["#f59e0b","#94a3b8","#b87333"][i]:"#999", fontSize:16, fontFamily:"Rajdhani,sans-serif" }}>
                  {i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`}
                </td>
                <td style={{ padding:"14px 12px" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:32, height:32, borderRadius:"50%", background:`hsl(${i*36},60%,55%)`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color:"#fff" }}>
                      {s.display_name[0]}
                    </div>
                    <div>
                      <div style={{ fontWeight:500, color:"#1a1a2e", fontSize:15 }}>{s.display_name}</div>
                      {s.id===user.id && <div style={{ fontSize:11, color:"#667eea" }}>Tu</div>}
                    </div>
                  </div>
                </td>
                <td style={{ padding:"14px 12px", textAlign:"center", color:"#555", fontSize:14 }}>{s.count}</td>
                <td style={{ padding:"14px 12px", textAlign:"center", color:"#555", fontSize:14 }}>{s.avg}</td>
                <td style={{ padding:"14px 12px", textAlign:"right", fontWeight:700, fontSize:18, color:"#1a1a2e", fontFamily:"Rajdhani,sans-serif" }}>{s.total.toFixed(1)}</td>
              </tr>
            ))}
          </tbody>
        </table>
        {standings.length===0 && <div style={{ textAlign:"center", padding:40, color:"#888" }}>Nessun punteggio assegnato ancora</div>}
      </Card>
    </div>
  );
}

// ─── Admin Page ────────────────────────────────────────────────────────────────
function AdminPage({ user }) {
  const [tab, setTab] = useState("overview");
  const [submissions, setSubmissions] = useState([]);
  const [matchdays, setMatchdays] = useState([]);
  const [users, setUsers] = useState([]);
  const [selectedMd, setSelectedMd] = useState(null);
  const [loading, setLoading] = useState(true);
  const [scores, setScores] = useState({});
  const [scoreNotes, setScoreNotes] = useState({});
  const [savingScore, setSavingScore] = useState({});
  const [scoreSaved, setScoreSaved] = useState({});
  const [audit, setAudit] = useState([]);
  const [passwords, setPasswords] = useState({});
  const [pwResult, setPwResult] = useState({});

  useEffect(() => {
    (async () => {
      const [mds, usrs] = await Promise.all([
        db.select("matchdays", "?order=number.asc"),
        db.select("league_users", "?is_admin=eq.false&select=id,username,display_name&order=display_name.asc"),
      ]);
      setMatchdays(mds || []);
      setUsers(usrs || []);
      if (mds && mds.length > 0) {
        const current = mds.find(m => !m.is_completed) || mds[mds.length - 1];
        setSelectedMd(current);
      }
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    if (!selectedMd) return;
    (async () => {
      const subs = await db.select("predictions", `?matchday_id=eq.${selectedMd.id}&select=id,prediction_text,submitted_at,updated_at,is_locked,score,score_notes,user_id,league_users(display_name,username)&order=submitted_at.asc`);
      setSubmissions(subs || []);
      const initScores = {};
      const initNotes = {};
      (subs || []).forEach(s => {
        initScores[s.id] = s.score != null ? String(s.score) : "";
        initNotes[s.id] = s.score_notes || "";
      });
      setScores(initScores);
      setScoreNotes(initNotes);
    })();
  }, [selectedMd]);

  useEffect(() => {
    if (tab !== "audit") return;
    (async () => {
      const logs = await db.select("submission_audit_log", "?order=logged_at.desc&limit=100&select=*,league_users(display_name),matchdays(number)");
      setAudit(logs || []);
    })();
  }, [tab]);

  const saveScore = async (predId) => {
    setSavingScore(s => ({ ...s, [predId]: true }));
    setScoreSaved(s => ({ ...s, [predId]: false }));
    try {
      const score = scores[predId] !== "" ? parseFloat(scores[predId]) : null;
      await db.update("predictions", { score, score_notes: scoreNotes[predId] || null }, `?id=eq.${predId}`);
      setScoreSaved(s => ({ ...s, [predId]: true }));
      setTimeout(() => setScoreSaved(s => ({ ...s, [predId]: false })), 3000);
    } catch (err) {
      alert("Errore: " + err.message);
    } finally {
      setSavingScore(s => ({ ...s, [predId]: false }));
    }
  };

  const toggleLock = async (pred) => {
    await db.update("predictions", { is_locked: !pred.is_locked }, `?id=eq.${pred.id}`);
    setSubmissions(ss => ss.map(s => s.id === pred.id ? { ...s, is_locked: !s.is_locked } : s));
  };

  const completeMd = async () => {
    if (!confirm(`Completare Giornata ${selectedMd.number}? Tutte le previsioni verranno bloccate.`)) return;
    await db.update("matchdays", { is_completed: true }, `?id=eq.${selectedMd.id}`);
    await db.update("predictions", { is_locked: true }, `?matchday_id=eq.${selectedMd.id}`);
    setMatchdays(mds => mds.map(m => m.id === selectedMd.id ? { ...m, is_completed: true } : m));
    setSelectedMd(md => ({ ...md, is_completed: true }));
  };

  const changePassword = async (userId, username) => {
    const pwd = passwords[userId];
    if (!pwd || pwd.length < 6) { alert("Password minimo 6 caratteri"); return; }
    setPwResult(r => ({ ...r, [userId]: "saving" }));
    try {
      await db.rpc("change_user_password", { target_user_id: userId, new_password: pwd });
      setPwResult(r => ({ ...r, [userId]: "saved" }));
      setPasswords(p => ({ ...p, [userId]: "" }));
      setTimeout(() => setPwResult(r => ({ ...r, [userId]: null })), 3000);
    } catch (err) {
      setPwResult(r => ({ ...r, [userId]: "error" }));
      alert("Errore cambio password: " + err.message);
    }
  };

  // Which users submitted
  const submittedIds = submissions.map(s => s.user_id);

  if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><Spinner size={40} /></div>;

  const tabs = [
    { id: "overview", label: "Previsioni" },
    { id: "scores", label: "Punteggi" },
    { id: "matchdays", label: "Giornate" },
    { id: "audit", label: "Audit log" },
    { id: "passwords", label: "Password utenti" },

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
        <h1 style={{ fontFamily: "Rajdhani, sans-serif", fontSize: 32, fontWeight: 700, color: "#1a1a2e", margin: 0 }}>Admin Panel</h1>
        <Badge color="red">Admin</Badge>
      </div>
      <p style={{ color: "#888", margin: "0 0 24px" }}>Gestione completa della lega</p>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, borderBottom: "2px solid #f0f0f0", marginBottom: 24 }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding: "10px 16px", border: "none", background: "none", cursor: "pointer",
            fontSize: 14, fontWeight: tab === t.id ? 600 : 400, color: tab === t.id ? "#667eea" : "#888",
            borderBottom: tab === t.id ? "2px solid #667eea" : "2px solid transparent",
            marginBottom: -2, fontFamily: "inherit",
          }}>{t.label}</button>
        ))}
      </div>

      {/* Matchday selector */}
      {(tab === "overview" || tab === "scores") && (
        <div style={{ marginBottom: 20, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <span style={{ fontSize: 14, color: "#888" }}>Giornata:</span>
          <select value={selectedMd?.id || ""} onChange={e => setSelectedMd(matchdays.find(m => m.id === e.target.value))}
            style={{ padding: "8px 12px", border: "1px solid #e0e0e0", borderRadius: 8, fontSize: 14, fontFamily: "inherit", outline: "none" }}>
            {matchdays.map(md => (
              <option key={md.id} value={md.id}>Giornata {md.number} {md.is_completed ? "(completata)" : ""}</option>
            ))}
          </select>
          {selectedMd && !selectedMd.is_completed && (
            <button className="btn btn-primary" onClick={completeMd} style={{ background: "#ef4444" }}>
              🔒 Chiudi giornata
            </button>
          )}
        </div>
      )}

      {/* Tab: Overview */}
      {tab === "overview" && selectedMd && (
        <div>
          <div style={{ display: "flex", gap: 16, marginBottom: 20 }}>
            <div className="stat-card" style={{ flex: 1 }}>
              <div style={{ fontSize: 24, fontWeight: 700, fontFamily: "Rajdhani, sans-serif", color: "#10b981" }}>{submissions.length}</div>
              <div style={{ fontSize: 13, color: "#888" }}>Previsioni inviate</div>
            </div>
            <div className="stat-card" style={{ flex: 1 }}>
              <div style={{ fontSize: 24, fontWeight: 700, fontFamily: "Rajdhani, sans-serif", color: "#ef4444" }}>{missingUsers.length}</div>
              <div style={{ fontSize: 13, color: "#888" }}>Partecipanti mancanti</div>
            </div>
            <div className="stat-card" style={{ flex: 1 }}>
              <div style={{ fontSize: 24, fontWeight: 700, fontFamily: "Rajdhani, sans-serif", color: "#667eea" }}>{users.length}</div>
              <div style={{ fontSize: 13, color: "#888" }}>Totale partecipanti</div>
            </div>
          </div>

          {missingUsers.length > 0 && (
            <Alert type="warning" style={{ marginBottom: 16 }}>
              Non hanno inviato: {missingUsers.map(u => u.display_name).join(", ")}
            </Alert>
          )}

          <Card>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ borderBottom: "2px solid #f0f0f0" }}>
                  <th style={{ textAlign: "left", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>UTENTE</th>
                  <th style={{ textAlign: "left", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>PREVISIONE</th>
                  <th style={{ textAlign: "center", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>INVIATA</th>
                  <th style={{ textAlign: "center", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>PUNTEGGIO</th>
                  <th style={{ textAlign: "center", padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>STATO</th>
                  <th style={{ padding: "10px 12px", fontSize: 12, color: "#888", fontWeight: 600 }}>AZIONI</th>
                </tr>
              </thead>
              <tbody>
                {submissions.map(s => (
                  <tr key={s.id} className="table-row" style={{ borderBottom: "1px solid #f5f5f5" }}>
                    <td style={{ padding: "12px 12px" }}>
                      <div style={{ fontWeight: 600, color: "#1a1a2e" }}>{s.league_users?.display_name}</div>

                    <td style={{ padding: "12px 12px", maxWidth: 300 }}>

                    <td style={{ padding: "12px 12px", textAlign: "center" }}>

          </Card>
        </div>
      )}

      {/* Tab: Scores */}
      {tab === "scores" && selectedMd && (
        <Card>
          <h2 style={{ margin: "0 0 20px", fontSize: 18, fontWeight: 600, color: "#1a1a2e" }}>
            Assegna punteggi — Giornata {selectedMd.number}

          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {submissions.map(s => (
              <div key={s.id} style={{ border: "1px solid #e8e8e8", borderRadius: 10, padding: 20 }}>

                  <div style={{ fontWeight: 600, color: "#1a1a2e", fontSize: 16 }}>{s.league_users?.display_name}</div>

                </div>

                <div style={{ display: "flex", gap: 12, alignItems: "flex-end", flexWrap: "wrap" }}>
                  <div>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 4 }}>PUNTEGGIO</label>
                    <input type="number" step="0.5" min="0" max="100" value={scores[s.id] || ""} onChange={e => setScores(sc => ({ ...sc, [s.id]: e.target.value }))}

                      placeholder="es. 8.5" />
                  </div>
                  <div style={{ flex: 1, minWidth: 200 }}>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 4 }}>NOTE</label>
                    <input type="text" value={scoreNotes[s.id] || ""} onChange={e => setScoreNotes(n => ({ ...n, [s.id]: e.target.value }))}
                      style={{ width: "100%", padding: "8px 12px", border: "1px solid #e0e0e0", borderRadius: 8, fontSize: 14, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }}
                      placeholder="Note sul punteggio..." />
                  </div>
                  <button className="btn btn-primary" onClick={() => saveScore(s.id)} disabled={savingScore[s.id]} style={{ whiteSpace: "nowrap" }}>
                    {savingScore[s.id] ? <><Spinner size={14} /> Salvo...</> : <><Icon name="save" size={14} /> Salva</>}
                  </button>

        </Card>
      )}

      {/* Tab: Matchdays */}
      {tab === "matchdays" && (
        <Card>
          <h2 style={{ margin: "0 0 16px", fontSize: 18, fontWeight: 600 }}>Stato giornate</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {matchdays.map(md => (
              <div key={md.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0", borderBottom: "1px solid #f0f0f0" }}>
                <span style={{ fontWeight: 500, color: "#1a1a2e" }}>Giornata {md.number}</span>
                <span style={{ fontSize: 13, color: "#888" }}>Deadline: {new Date(md.deadline).toLocaleString("it-IT")}</span>
                {md.is_completed ? <Badge color="gray">Completata</Badge> : new Date() > new Date(md.deadline) ? <Badge color="amber">Scaduta</Badge> : <Badge color="green">Aperta</Badge>}
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* Tab: Audit */}
      {tab === "audit" && (
        <Card>
          <h2 style={{ margin: "0 0 16px", fontSize: 18, fontWeight: 600 }}>Log di audit — ultimi 100 eventi</h2>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "2px solid #f0f0f0" }}>
                {["DATA/ORA", "UTENTE", "GIORNATA", "AZIONE", "CONTENUTO"].map(h => (
                  <th key={h} style={{ textAlign: "left", padding: "8px 10px", fontSize: 11, color: "#888", fontWeight: 600 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {audit.map(a => (
                <tr key={a.id} className="table-row" style={{ borderBottom: "1px solid #f8f8f8" }}>
                  <td style={{ padding: "8px 10px", fontSize: 12, color: "#888", whiteSpace: "nowrap" }}>
                    {new Date(a.logged_at).toLocaleString("it-IT")}
                  </td>
                  <td style={{ padding: "8px 10px", fontSize: 13, fontWeight: 500 }}>{a.league_users?.display_name || a.user_id}</td>
                  <td style={{ padding: "8px 10px", fontSize: 13 }}>G{a.matchdays?.number}</td>
                  <td style={{ padding: "8px 10px" }}>
                    <Badge color={a.action === "FAILED" ? "red" : a.action === "CREATE" ? "green" : a.action === "UPDATE" ? "blue" : "gray"}>
                      {a.action}
                    </Badge>
                  </td>
                  <td style={{ padding: "8px 10px", fontSize: 12, color: "#555", maxWidth: 300, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    {a.prediction_text ? `"${a.prediction_text}"` : a.error_message || "—"}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {audit.length === 0 && <div style={{ textAlign: "center", padding: 30, color: "#888" }}>Nessun evento nel log</div>}
        </Card>
      )}

      {/* Tab: Passwords */}
      {tab === "passwords" && (
        <Card>
          <h2 style={{ margin: "0 0 8px", fontSize: 18, fontWeight: 600 }}>Gestione password utenti</h2>
          <p style={{ color: "#888", fontSize: 14, marginBottom: 20 }}>Imposta una nuova password per qualsiasi partecipante</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {users.map(u => (
              <div key={u.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: "1px solid #f0f0f0" }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: "#667eea20", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, color: "#667eea", fontSize: 14 }}>

                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 500, color: "#1a1a2e" }}>{u.display_name}</div>
                  <div style={{ fontSize: 12, color: "#999" }}>@{u.username}</div>

                <input type="password" placeholder="Nuova password" value={passwords[u.id] || ""} onChange={e => setPasswords(p => ({ ...p, [u.id]: e.target.value }))}
                  style={{ padding: "8px 12px", border: "1px solid #e0e0e0", borderRadius: 8, fontSize: 14, fontFamily: "inherit", outline: "none", width: 180 }} />
                <button className="btn btn-primary" onClick={() => changePassword(u.id, u.username)} disabled={pwResult[u.id] === "saving"} style={{ whiteSpace: "nowrap" }}>
                  {pwResult[u.id] === "saving" ? <Spinner size={14} /> : pwResult[u.id] === "saved" ? "✓ Salvata" : "Cambia"}
                </button>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}


// ─── All Predictions Page ─────────────────────────────────────────────────────
function AllPredictionsPage({ user }) {
  const [matchdays, setMatchdays] = useState([]);
  const [selectedMd, setSelectedMd] = useState(null);
  const [allUsers, setAllUsers] = useState([]);
  const [submissions, setSubmissions] = useState([]);
  const [matches, setMatches] = useState([]);
  const [loadingMds, setLoadingMds] = useState(true);
  const [loadingData, setLoadingData] = useState(false);

  // Load all matchdays + users once
  useEffect(() => {
    (async () => {
      const [mds, users] = await Promise.all([
        db.select("matchdays", "?order=number.asc&select=id,number,deadline,is_completed"),
        db.select("league_users", "?is_admin=eq.false&select=id,display_name,username&order=display_name.asc"),
      ]);
      setMatchdays(mds || []);
      setAllUsers(users || []);
      // Default: last completed matchday, or first upcoming
      const completed = (mds || []).filter(m => m.is_completed);
      const upcoming  = (mds || []).find(m => !m.is_completed);
      setSelectedMd(completed[completed.length - 1] || upcoming || null);
      setLoadingMds(false);
    })();
  }, []);

  // Load submissions + matches when matchday changes
  useEffect(() => {
    if (!selectedMd) return;
    setLoadingData(true);
    setSubmissions([]);
    setMatches([]);
    (async () => {
      const [subs, enriched] = await Promise.all([
        db.select("predictions", `?matchday_id=eq.${selectedMd.id}&select=id,user_id,prediction_text,submitted_at,updated_at,is_locked,score&order=submitted_at.asc`),
        loadMatchesForMatchday(selectedMd.id),
      ]);
      setSubmissions(subs || []);
      setMatches(enriched);
      setLoadingData(false);
    })();
  }, [selectedMd?.id]);

  const now = new Date();
  const isOpen = selectedMd && !selectedMd.is_completed && now < new Date(selectedMd.deadline);

  // Build user map
  const userMap = {};
  allUsers.forEach(u => { userMap[u.id] = u; });

  // Parse picks for a prediction text
  const parsePicks = (text) => parsePredText(text || "", matches);

  if (loadingMds) return <div style={{ display:"flex", justifyContent:"center", padding:60 }}><Spinner size={40}/></div>;

  return (
    <div>
      <h1 style={{ fontFamily:"Rajdhani,sans-serif", fontSize:32, fontWeight:700, color:"#1a1a2e", margin:"0 0 4px" }}>
        Tutti i pronostici
      </h1>
      <p style={{ color:"#888", margin:"0 0 24px" }}>
        Le previsioni di tutti i partecipanti — visibili a tutti dopo la deadline
      </p>

      <div style={{ display:"grid", gridTemplateColumns:"170px 1fr", gap:24, alignItems:"start" }}>

        {/* Matchday sidebar */}
        <div style={{ maxHeight:"80vh", overflowY:"auto", paddingRight:4 }}>
          <div style={{ fontSize:11, fontWeight:600, color:"#888", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:10 }}>Giornate</div>
          {matchdays.map(md => {
            const pred = submissions.find(s => s); // just for color
            const isSelected = selectedMd?.id === md.id;
            const ddl = new Date(md.deadline);
            const open = !md.is_completed && now < ddl;
            return (
              <div key={md.id} onClick={() => setSelectedMd(md)} style={{
                padding:"10px 12px", borderRadius:9, cursor:"pointer", marginBottom:5,
                background: isSelected ? "#f0f1ff" : "#fff",
                border: isSelected ? "1.5px solid #667eea" : "1.5px solid #e8e8e8",
                transition:"all 0.1s",
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontWeight:700, fontSize:14, color:"#1a1a2e" }}>G{md.number}</span>
                  {md.is_completed
                    ? <span style={{ fontSize:10, color:"#888" }}>✓</span>
                    : open
                      ? <span style={{ fontSize:10, color:"#f59e0b", fontWeight:700 }}>APERTA</span>
                      : <span style={{ fontSize:10, color:"#ccc" }}>—</span>}
                </div>
              </div>
            );
          })}
        </div>

        {/* Main content */}
        {selectedMd && (
          <div>
            {/* Header */}
            <Card style={{ marginBottom:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontFamily:"Rajdhani,sans-serif", fontSize:22, fontWeight:700, color:"#1a1a2e" }}>
                    Giornata {selectedMd.number}
                  </div>
                  <div style={{ fontSize:13, color:"#888", marginTop:2 }}>
                    Deadline: {new Date(selectedMd.deadline).toLocaleString("it-IT")}
                  </div>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  {selectedMd.is_completed
                    ? <Badge color="gray">Completata</Badge>
                    : isOpen
                      ? <Badge color="amber">⏳ Aperta — previsioni nascoste</Badge>
                      : <Badge color="green">Chiusa</Badge>}
                  <Badge color={submissions.length === allUsers.length ? "green" : "amber"}>
                    {submissions.length}/{allUsers.length} inviati
                  </Badge>
                </div>
              </div>

              {/* If matchday is still open: show who submitted but NOT what they predicted */}
              {isOpen && (
                <div style={{ marginTop:14 }}>
                  <Alert type="warning">
                    La giornata è ancora aperta. I pronostici saranno visibili solo dopo la deadline per evitare influenze.
                  </Alert>
                </div>
              )}
            </Card>

            {loadingData ? (
              <div style={{ display:"flex", justifyContent:"center", padding:40 }}><Spinner size={32}/></div>
            ) : isOpen ? (
              /* Deadline not passed: only show WHO submitted, not what */
              <Card>
                <div style={{ fontSize:11, fontWeight:600, color:"#888", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:14 }}>
                  Stato invii
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {allUsers.map(u => {
                    const sub = submissions.find(s => s.user_id === u.id);
                    const isMe = u.id === user.id;
                    return (
                      <div key={u.id} style={{
                        display:"flex", justifyContent:"space-between", alignItems:"center",
                        padding:"12px 16px", borderRadius:10,
                        background: sub ? "#f0fdf4" : "#fafafa",
                        border: sub ? "1px solid #bbf7d0" : "1px solid #f0f0f0",
                      }}>
                        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                          <div style={{ width:32, height:32, borderRadius:"50%", background:`hsl(${allUsers.indexOf(u)*36},60%,55%)`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color:"#fff" }}>
                            {u.display_name[0]}
                          </div>
                          <div>
                            <div style={{ fontWeight:600, color:"#1a1a2e", fontSize:14 }}>{u.display_name}</div>
                            {isMe && <div style={{ fontSize:11, color:"#667eea" }}>Tu</div>}
                          </div>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          {sub ? (
                            <>
                              <Badge color="green">✓ Inviato</Badge>
                              <div style={{ fontSize:11, color:"#999" }}>
                                {new Date(sub.submitted_at).toLocaleString("it-IT")}
                              </div>
                            </>
                          ) : (
                            <Badge color="red">Non ancora</Badge>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Card>
            ) : (
              /* Deadline passed or completed: show full predictions */
              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                {allUsers.map((u, uIdx) => {
                  const sub = submissions.find(s => s.user_id === u.id);
                  const isMe = u.id === user.id;
                  const picks = sub ? parsePicks(sub.prediction_text) : {};

                  return (
                    <Card key={u.id} style={{ border: isMe ? "1.5px solid #667eea" : "1px solid #e8e8e8" }}>
                      {/* User header */}
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: sub ? 14 : 0 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                          <div style={{ width:36, height:36, borderRadius:"50%", background:`hsl(${uIdx*36},60%,55%)`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:700, color:"#fff" }}>
                            {u.display_name[0]}
                          </div>
                          <div>
                            <div style={{ fontWeight:700, color:"#1a1a2e", fontSize:15, display:"flex", alignItems:"center", gap:6 }}>
                              {u.display_name}
                              {isMe && <span style={{ fontSize:11, color:"#667eea", fontWeight:500 }}>Tu</span>}
                            </div>
                            {sub && (
                              <div style={{ fontSize:11, color:"#999", marginTop:1 }}>
                                Inviata: {new Date(sub.submitted_at).toLocaleString("it-IT")}
                                {sub.updated_at !== sub.submitted_at && ` · Modificata: ${new Date(sub.updated_at).toLocaleString("it-IT")}`}
                              </div>
                            )}
                          </div>
                        </div>
                        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                          {sub?.score != null && <Badge color="purple">⭐ {Number(sub.score).toFixed(1)} pt</Badge>}
                          {!sub && <Badge color="red">✗ Non inviata</Badge>}
                        </div>
                      </div>

                      {/* Prediction picks */}
                      {sub && matches.length > 0 && (
                        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                          {matches.map(m => {
                            const pick = picks[m.id];
                            const correct = m.is_played && pick && pick === m.result;
                            const wrong   = m.is_played && pick && pick !== m.result;
                            return (
                              <div key={m.id} style={{
                                display:"grid", gridTemplateColumns:"1fr auto 1fr auto auto", alignItems:"center", gap:8,
                                padding:"8px 12px", borderRadius:8,
                                background: correct ? "#f0fdf4" : wrong ? "#fef2f2" : "#f8f9fc",
                                border: correct ? "1px solid #bbf7d0" : wrong ? "1px solid #fecaca" : "1px solid #f0f0f0",
                                fontSize:13,
                              }}>
                                <div style={{ fontWeight:600, color:"#1a1a2e", textAlign:"right", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.home_name}</div>
                                <div style={{ color:"#ccc", fontSize:11, flexShrink:0 }}>vs</div>
                                <div style={{ fontWeight:600, color:"#1a1a2e", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.away_name}</div>
                                <div style={{ flexShrink:0 }}>{pick ? <ResultPill result={pick}/> : <span style={{ color:"#ccc" }}>—</span>}</div>
                                <div style={{ flexShrink:0, fontSize:12, fontWeight:700 }}>
                                  {correct && <span style={{ color:"#10b981" }}>✓</span>}
                                  {wrong   && <span style={{ color:"#ef4444" }}>✗</span>}
                                  {!m.is_played && <span style={{ color:"#ccc" }}>?</span>}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {/* No prediction */}
                      {!sub && (
                        <div style={{ color:"#ef4444", fontSize:13, marginTop:4, fontStyle:"italic" }}>
                          Nessuna previsione inviata per questa giornata.
                        </div>
                      )}
                    </Card>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────
function App() {
  const state = useStore();
  const [page, setPage] = useState("dashboard");

  // Expose setPage globally for DashboardPage link
  useEffect(() => { window._setPage = setPage; }, []);

  if (state.loading) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0f0c29, #302b63)" }}>
        <div style={{ textAlign: "center", color: "#fff" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>⚽</div>
          <Spinner size={40} />
        </div>
      </div>
    );
  }

  if (!state.auth) return <LoginPage />;

  const { user } = state.auth;

  const pages = {
    dashboard: <DashboardPage user={user} />,
    predictions: !user.is_admin ? <PredictionsPage user={user} /> : <div style={{padding:40}}><Alert type="error">Gli admin non possono inviare previsioni.</Alert></div>,
    "all-predictions": <AllPredictionsPage user={user} />,
    standings: <StandingsPage user={user} />,
    calendar: <CalendarPage user={user} />,
    history: <HistoryPage user={user} />,
    admin: user.is_admin ? <AdminPage user={user} /> : <div><Alert type="error">Accesso negato</Alert></div>,
  };

  return (
    <Layout user={user} page={page} setPage={setPage}>
      {pages[page] || pages.dashboard}
    </Layout>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
