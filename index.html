// ── DB helpers ────────────────────────────────────────────────────────────────
async function dbGet(table, qs) {
  const r = await fetch(SB_URL + "/rest/v1/" + table + (qs || ""), { headers: HDR });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbPost(table, body) {
  const r = await fetch(SB_URL + "/rest/v1/" + table, {
    method: "POST", headers: { ...HDR, Prefer: "return=representation" },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbPatch(table, qs, body) {
  const r = await fetch(SB_URL + "/rest/v1/" + table + qs, {
    method: "PATCH", headers: { ...HDR, Prefer: "return=representation" },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function rpc(fn, body) {
  const r = await fetch(SB_URL + "/rest/v1/rpc/" + fn, {
    method: "POST", headers: { ...HDR, Prefer: "return=representation" },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin(username, password) {
  const users = await dbGet("league_users", "?username=eq." + encodeURIComponent(username) + "&select=id,username,display_name,is_admin,password_hash");
  if (!users || !users.length) throw new Error("Utente non trovato");
  const u = users[0];
  const ok = await rpc("verify_password", { input_password: password, stored_hash: u.password_hash });
  const valid = Array.isArray(ok) ? ok[0] : ok;
  if (!valid) throw new Error("Password errata");
  const sess = await dbPost("sessions", { user_id: u.id });
  return { token: sess[0].token, user: { id: u.id, username: u.username, display_name: u.display_name, is_admin: u.is_admin } };
}
async function doLogout(token) {
  await dbPatch("sessions", "?token=eq." + token, { is_active: false });
}
async function validateSession(token) {
  const s = await dbGet("sessions", "?token=eq." + encodeURIComponent(token) + "&is_active=eq.true&expires_at=gt." + new Date().toISOString() + "&select=user_id");
  if (!s || !s.length) return null;
  const u = await dbGet("league_users", "?id=eq." + s[0].user_id + "&select=id,username,display_name,is_admin");
  return u && u.length ? u[0] : null;
}

// ── Load matches ──────────────────────────────────────────────────────────────
async function loadMatches(matchdayId) {
  const [rawM, teams] = await Promise.all([
    dbGet("matches", "?matchday_id=eq." + matchdayId + "&select=id,home_team_id,away_team_id,home_goals,away_goals,home_fantapunti,away_fantapunti,result,is_played&order=id.asc"),
    dbGet("teams", "?select=id,name")
  ]);
  const tm = {};
  teams.forEach(t => { tm[t.id] = t.name; });
  return (rawM || []).map(m => ({ ...m, home_name: tm[m.home_team_id] || "?", away_name: tm[m.away_team_id] || "?" }));
}

// ── Prediction text helpers ───────────────────────────────────────────────────
function buildText(picks, matches) {
  return matches.map(m => m.home_name + " vs " + m.away_name + ": " + (picks[m.id] || "?")).join(" | ");
}
function parseText(text, matches) {
  const picks = {};
  if (!text) return picks;
  text.split(" | ").forEach(part => {
    const rx = /^(.+) vs (.+): ([1X2?])$/.exec(part);
    if (!rx) return;
    const m = matches.find(mx => mx.home_name === rx[1] && mx.away_name === rx[2]);
    if (m) picks[m.id] = rx[3];
  });
  return picks;
}

function StandingsPage({ user }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    (async () => {
      // Load all completed matchdays, their matches (with results), and all predictions
      const [users, mds] = await Promise.all([
        dbGet("league_users", "?is_admin=eq.false&select=id,display_name,username&order=display_name.asc"),
        dbGet("matchdays", "?is_completed=eq.true&select=id,number&order=number.asc")
      ]);
      if (!mds || !mds.length) { setRows((users||[]).map(u=>({...u,correct:0,wrong:0,played:0}))); setLoading(false); return; }
      // Load all matches + all predictions for completed matchdays in bulk
      const mdIds = mds.map(m => m.id);
      const [allMatches, allPreds] = await Promise.all([
        dbGet("matches", "?matchday_id=in.(" + mdIds.join(",") + ")&is_played=eq.true&select=id,matchday_id,home_team_id,away_team_id,result"),
        dbGet("predictions", "?matchday_id=in.(" + mdIds.join(",") + ")&select=user_id,matchday_id,prediction_text")
      ]);
      // Build team name map (not needed, we just need result)
      // For each user, count correct/wrong across all completed matchdays
      const map = {};
      (users||[]).forEach(u => { map[u.id] = { ...u, correct: 0, wrong: 0, played: 0 }; });
      (allPreds||[]).forEach(pred => {
        if (!map[pred.user_id]) return;
        const mdMatches = (allMatches||[]).filter(m => m.matchday_id === pred.matchday_id);
        // Parse prediction text: "TeamA vs TeamB: 1 | ..."
        // We need match id -> result mapping, but prediction text uses team names
        // Load matches with team names for this matchday was done in loadMatches helper
        // Here we do a simpler approach: match by position in prediction text
        const parts = (pred.prediction_text || "").split(" | ");
        parts.forEach((part, idx) => {
          const rx = /^(.+) vs (.+): ([1X2?])$/.exec(part);
          if (!rx || rx[3] === "?") return;
          // Find the match by position (matches are ordered by id)
          const m = mdMatches[idx];
          if (!m || !m.result) return;
          map[pred.user_id].played++;
          if (rx[3] === m.result) map[pred.user_id].correct++;
          else map[pred.user_id].wrong++;
        });
      });
      const sorted = Object.values(map).sort((a, b) => b.correct - a.correct || a.wrong - b.wrong);
      setRows(sorted); setLoading(false);
    })();

        // Header
        React.createElement("div", null),
        React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: "#aaa", letterSpacing: "0.06em", padding: "8px 0" } }, "PARTECIPANTE"),
        React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: "#10b981", letterSpacing: "0.06em", textAlign: "center" } }, "\u2713"),
        React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: "#ef4444", letterSpacing: "0.06em", textAlign: "center" } }, "\u2717"),
        React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: "#888", letterSpacing: "0.06em", textAlign: "center" } }, "TOT"),
