<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <title>NewFantaMaster — Private League</title>
  <meta name="description" content="NewFantaMaster Private Fantasy League — Previsioni e classifiche">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    /* ── Mobile & anti-zoom ── */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    button, a, input, select, textarea { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    /* iOS input zoom fix — keep font-size >= 16px on inputs */
    input, select, textarea { font-size: 16px !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    /* ── Responsive layout ── */
    @media (max-width: 768px) {
      .sidebar { display: none !important; }
      .main-layout { flex-direction: column !important; }
      .main-content { padding: 16px !important; }
      .two-col-grid { grid-template-columns: 1fr !important; }
      .matchday-grid { grid-template-columns: repeat(7, 1fr) !important; }
      .status-grid { grid-template-columns: 1fr !important; }
      .mobile-nav { display: flex !important; }
    }
    /* ── Mobile nav bar (hidden on desktop) ── */
    .mobile-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: linear-gradient(180deg, #1a1a2e, #16213e);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    }
    .mobile-nav button {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; color: rgba(255,255,255,0.55);
      font-size: 10px; font-weight: 500; font-family: inherit; cursor: pointer;
      padding: 4px 0; transition: color 0.15s;
    }
    .mobile-nav button.active { color: #fff; }
    .mobile-nav button svg { opacity: 0.8; }
    .mobile-nav button.active svg { opacity: 1; }
    /* Bottom padding for scrollable content on mobile */
    @media (max-width: 768px) {
      .main-content { padding-bottom: 72px !important; }
    }
  </style>
